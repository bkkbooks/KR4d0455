body:
  text: 青崖集卷一元魏初撰五言古詩奉答楊左丞詩并序左丞相公公宋駙馬姓楊氏名鎮今江西行省左丞自江西來杭不鄙不肖以詩見示擬古云志士多苦心觀梅云月淡溪橋浸踈影雪深籬落見橫枝漁村云籬燈吐秋影岸荻長春芽野水一雙鷺暮煙三四家維揚遣懷云夢回孤館人千里漏轉重城月一樓客中清明云滿眼落花隨水去無情垂柳共春愁秋色云涼月一江翻夜白夕陽千樹奪春紅和周公謹韻云村酒黃花九日後曉霜紅葉兩山秋登孺子亭云春樹倚簷分浦色暮雲含雨渡江心寄林上人云林樹有無生雨氣野花開落見春心似此等句皆清峻有古意前賢謂文章之作恆發於流離困頓憔悴無聊不平之中今相君生長富貴不為聲色狗馬所奪每興懷託物乃能造此雅淡境界非其篤好而才品不凡者未易及之敢作古語一章奉答厚意風雅日已逺嘲評月露多况當紈綺貴此意竟如何左轄膺朝寄瘡痍仰撫摩一斑時爾見清峻湧江波好在都俞際賡吟舜殿歌三月草九日郡庠後亭宴盧啓先僉事晨集穎江渚列席當蕙邊斯亭信顯敞翠嶺帶澄川潮駕宜城步山積司空原青松紛被徑紅桃競發園衆賔起為壽繁音出嬌絃中觴念逺離嵗行已再遷漂萍有時合浮雲未見旋今朝不為樂來會知何年安慶郡庠後亭宴董僉事鯨鯢起淮服郡邑盡燒殘兹城獨完好使者一開顔省風降文囿弭節遵曲干雙池夾行徑纍榭在雲間天逺羣峯出地逈滄江還霞生射蛟室鴈沒逢龍山開樽華堂上命酌俯危闌主人送瑶爵但云嘉會難豈為杯酒歡樂此罷民安魄淵無恆彩清川有急瀾明晨起驂服相望阻重關王仲思所藏幸蜀圖小李將軍畫曩豫按川蜀此道凡九過仰髙如梯登遇下若井墮﨑嶇百險中平步得幾箇朝來拂橫披恍若有今我因思開元初四海樂恬妥米帛三四錢萬里絶戍邏華清歌舞時已構此坎坷不獨君王家人生械亦叵將軍豈無心可以銘諸座匏瓜詩并序禹卿趙君别墅築亭曰匏瓜諸公咸有歌詠初不揆以淵明户庭無塵雜虛室有餘間作十詩以道其間適之意在風俗奔競中獨能操守如此其亦可尚矣出城十里餘小小築園圃牆頺補青山月冷杵秋黍蕭然無人來風葉擁庭户志意若不足文書官有程何如田畝間脫落塵土星時時有佳客爛醉秋風庭此書不可廢此酒不可無醒時自漉酒醉後還枕書人生天地間窮逹竟何如人皆有樂地百偽奪其真朝趨富兒屋莫隨肥馬塵不知竟何得空負百年身青雲半知已遐遁非寡合持身自有道許與不可雜君看誰卜鄰慎獨有懸榻非無功名心樂此樵與漁炎涼各以時知力誰能渝蕭然一亭上心境還清虛只今終南山亦自有少室捷徑以索價兹心素所疾一匏無餘事優遊保清吉匏瓜聖所喻繫著亦何有時行與時止豈復論竒偶聊以名兹亭拍塞貯春酒築亭瞰平野四望情意舒青山入座來尊俎雜肴蔬雖無九鼎侈此樂亦有餘以君邁往氣未必能久間唯其不自售所以行之艱作詩固可工亦可厲癡頑楊庸齋移竹二首子雲築新居瀟灑過日月一官笑鄭虔忍為塵埃沒歸來謝俗聲山影動簷樾看此渭川秋萬古幽興發青青河畔柳旋插旋成陰夭夭溪上桃蓓蕾開紅金誰能愛吾竹過眼從蕭森涼風嵗云莫乃見髙人心間居雜詠五首家貧人事稀蕭索坐茅屋雖無舟楫心詩書敢私淑髙卧北窗下清風響梧竹聖道豈逺人其源由灑掃惟彼賢逹人樂以不知老喟然嘗自傷立身苦不早朱墨生涯拙青銅勳業羞三山鳯伏月萬里鷹搏秋時時拂塵卷造物何悠悠人生百年內憂虞何時歇不如棄塵事讀書古松樾偉哉聖賢心秋波湛明月傷彼蕙蘭花不結君王池秋露有肅殺落日空山陂良無呈瑞姿虛名將奚為為亷公迪壽矯矯亷泉公有子令公迪讀書逹事體意逺文且質余兹何幸焉得與共憲職但願君侯心敬慎恆若一諸葛武侯漢運固已厄臣心無偏安出師非幸功為國將勝殘所當盡者分不可期者天至今原上草慘慘縈愁煙七言古詩畎畝謡為馬丈師易夀君不見阿衡畎畝一餓叟孰謂乃有堯之心以身許亳即自任從容一理無升沉又不見陶家松石草堂月萬古笑傲聲輝發即今有人誰似之介山處士心如雪怡情抱蒿萊教子付孰説一家唐舜民肯事張儀舌先生于兹一何少先生於兹又何拙世間碌碌不足數賴有天徒與吾語茫茫四海少顔色會當下筆生風雨為朴散提刑壽精神滿腹眼如漆落筆蛟虬大如尺君侯纍世公卿家清議到君能事畢憶昨臺中初見時虎頭金節含春姿陪從評議得梗槩磊磊落落青松枝相期不得長相與汧隴秋煙漢城雨今年駐馬鳯凰泉定教有此青燈語便當載酒三百壺對君城南梅花株為君上壽為君舞醉倒不用春風扶趙公泉趙公智者流樂水性其天居人慕公義以公名公泉巉巉石齒作細穿引渠厨屋清涓涓西鍬東鍤各有用門前半溉桑麻田微雨乍添春蕩漾輕風細蹙秋淪漣行潦之水無根源豈能逝者如斯川泉石之娛君實賢我意愛君或不然東甫妖氛今未已要君倒卷黃河湔趙樊川四十塊坐未出門樊川佳處來傳聞就中韋杜稱第一贊皇趙公今主人主人本是風雲客斡旋造化工彌綸西南雨漏不可塞以手補之天為新慨然拂却長安塵移家要與黃溪鄰霜葉煙花秋復春十年人仰樊川君鶴書一夕復徴辟玉案圭峯淡空碧巾車迢迢入燕國前日所聞今始識相逢重索城南詩才薄空慚少陵筆送王敬之御史耿伯玉臺掾東歸敬之方平尚質直伯玉謨謀加緻密中臺二妙卓有聲驄馬西來能事畢繡衣東望五雲深盧龍煙草金溝水欲知别後憶君時萬疊秦山秋雨裏題趙明叔未央瓦硯凄凄古月土花碧溜雨秋簷照螢濕龍拏虎搏二千年火烈風摧見枯質鉛香蝕盡星蕭蕭又逐幽人入潛室繁華百閲無好心淨涵秋波墨如漆神工巧護有所持主人鄭重董狐筆書聽琴賦卷後寥休愛君如愛弟為君賦此盡琴意寥休既作汗漫遊今君亦從此而逝嗚呼天地誰知音明月髙山與流水鳯翔城南得京都家書鳯翔城南山路迷鳯翔城東人來稀黃塵鞍馬偶相及乃是史子京都歸倉忙問訊語未已手出平安遺我思開緘一讀為再讀咫尺慈顔不逺違匆匆二月長安道南北馳心似秋草女孫解語學念詩應道在家貧亦好雜言送劉樂二公君看冀北馬逸足一展無九州黃金絡頭亦不惡要與八駿追真遊君看萬里鵠六翮搏清秋安能只作梁上燕銜泥附熱空啁啾吾家劉兄誰與儔濟物不減商川舟吾家樂弟師前修慷慨已識元龍樓酒酣氣張吐竒熖霹靂墮地騰蛟虯世間俗事不著眼况復筆墨鐫頑鯫南風吹雲動髙興拏舟吸翠灤江頭江頭去天才三尺傾肝露膽皆公侯乃知君家富貴本易取落落不必工雕鎪我窮閉門秋水隈買田無力耕無牛墻根草色上階緑雨中破屋枝撑幽不獨人嗟我亦嗟直以不愧消百憂因君作别一大笑始信寓説未易齊鵬鳩杭州大雪并序至元二十有一年十二月七日杭州大雪之明日偕中丞楊子裕治書侍御史張夢符自湧金門登舟謁林和靖祠過太一宫憑欄四望吳山諸峯瓊樓玉樹上下一色日光皎然不敢正視長時在煙雨空濛中忽覩此晴霽亦竒觀也夢符走筆賦長語數韻初不揆度牽強奉次寸腸不用多蟠結千計百思徒屑屑春風昨夜到梅花况是西湖好晴雪平時走馬入燕雲不憶扁舟落江浙人生南北亦偶然造物何嘗管調燮竹捎松滴玉零星一樣林逋詩苦冽神仙官府小洞天琴鶴正為我輩設酒酣擊楫回中流江山逸興悠然發自憐青鬢已如絲只有丹心猶似鐡利州值雪次張周卿韻至元丁丑冬分核東川趍中臺二妙霍與張適與會遇成同途朝行長林夜守更語話情切忘﨑嶇偶然雪嶺滑復滑驛騎凡劣不可驅一日凡五墜五墜之外猶可探驪珠黃泥滿身不足笑大笑騃僕汝墜汝復來吾扶相看大吒復相語誰遣不守君家株我時酒熱氣已張乃謂此亦何足成嗟吁與君更約明年行共看夔州八陳圖題歸潛洞巔崖鑿透苔花碧繞澗風來竹香濕龍頭蛻骨蟄不飛老殼中枵含古質橫林六月秋生衣垂簾冬夜春浮筆主人夢覺邯鄲來乍得幽深快胸臆君不見玉關將軍冰雪肌廟堂謨臣安危機一發不中羣口譏昨日把笏今扶犁誰知趙侯鬢未衰中流勇退世所推却愁此志不終遂再使騰踏今昌期送趙大中從李五祖奉祀嶽瀆男兒兀坐近四十骨弱心痿徒補輯繞床百匝呼少陵安得秋風生羽翼吾家趙弟本不凡鬢秃鬚長眼如漆江海方期汗漫遊一夕飛緘御香濕天台真人馬子徵愛君能詩重君筆太華峯頭日觀西萬壑風煙入呼吸歸來落紙中書堂頓覺吾輩生輝光青雲從此一萬丈回首俗物都茫茫登朝天嶺余來漢中凡三年大山小山行欲遍今年復有東川行大抵勢隨岡阜轉石頭犖確顛且危不獨心驚夢亦戰利州城北到朝天又是川行山一變懸崖皴澀留苔青石罅陰森鬱松蒨得詩數語疑有神得酒百杯亦不倦回環應接竒無窮乃見平時所未見落落參軍正紫髯行行御史真鐡面相看大醉復長歌滅沒春鴻天一線適安堂窮通有定分流坎無庸悲湘纍自苦亦太隘韓子孤憤將奚為人生百年渾幾時鼠窺鬼瞰徒成私何如樊川一樽酒往者莫究今已而秦川如畫渭如絲韋曲杜曲無聲詩髙堂駕空竹樹裡觚稜瀟灑含幽姿起居飲食頗自適不矯不飾隨所施舉手為謝昌黎師乃今平原能得之有時髙咏歸來辭有時獨酌芙蓉巵人間所得容力取委之順之夫何思韓監察所藏畫馬房星降精雲晦明天機滅沒麒麟行逸羣絶足豈易得側身佇目長風生憶昔周王走八極不惜千金買竒骨浮雲追電迤邐至千里瑶池才一蹴漢家沙苑唐虎臣隊色滿山雲錦新只今雄駿竟寂寞轉益愁向駑駘羣吁嗟冀北亦古國安得天驥曽不聞駕轅伏櫪計必有王良伯樂誰其人韓卿好古得此圖索遍烏臺好詩客侵晨打門驚夢覺開卷金石聲㗲㗲雨中破屋百不遂才薄何以塞君責此圖一日當飛去看避青驄洛陽陌遊玉泉少時嘗讀子虛賦愛其胸中雲夢淮湘鄂越厯厯生風雨我思古人何悠悠遂欲大放心顔揮斥八極鞭九州誰其捉我坐屋底壯心不死庸有幾玉泉一覿凡五年風水咫尺如千里孫劉愛厚有嘉招溫詩厯落亦竒士郜侯俊秀甫逺來騏驥不慚駑與齒借驢肩酒穿村行雲煙草樹來尋盟初盤山腰探龍窟空明鴻洞玻璃青買魚釃酒放船入鼇頭掀舞蛟人泣鼓楫敲舷凌浩蕩嵓崖倒影屏風濕君能為我傾倒雙白瓶我欲為君拚醉一吸復一吸沉竿續蔓不可測黑緑陰深五千尺杳然心悸身生芒泊岸為著靈運屐攀緣古柏上層巔細路蜿蜒繞鯨脊萬古風從鳥道來夕陽天影凝空碧解衣小憩足力生西南更覔丹丘迹人生天地逆旅間貴無等倫惟有間功名既不麒麟閣箕穎自合相追攀折腰摧眉必不已役役沒沒誰爾憐我知此理有定論所遇所窮或者天東山歌酒乃大起夜郎醉月終其年古賢出處各有以安吾見在清樽前觀象詩此舊作也至元十八年見之于并門張巨源家因録之皇帝馬箠開雲南始得一象來中國中國傳聞未嘗見一日爭覩轟霹靂巨鼻引地六七尺左卷右舒為口役耳項垂垂倍數牛皮毛蒼蒼艾豭黑目竪青熒鏡有光背濶隱嶙山之脊卷髮蠻奴鐡作鈎要將驅使驚九州吾聞國家方寶賢異物自至非所求誰能更上旅獒篇清風萬古追西周五言律詩送劉祥卿之上都筆硯相從日于今四十年關山長契濶尊酒暫留連汾水秋風裏灤江霽雪邊故人如見問為説已華顛送張夢符磊落衣冠舊詩書照眼青禮闈今妙選憲府昔才名漢水三千夢錢塘十里亭殷勤一杯酒江海望澄清送葉亦愚向在諸生列孤危斥老姦今逢太平日咫尺拜天顔盡已都俞際無心用舍間錢塘八九月秋色滿吳山挽吕丈子謙憶昔京都日青山拜上庠只今江海外白髮見諸郎行業誰先後功名竟渺茫無從酹秋草三復白雲章褒城即席送何侍御話别京都後音書隨渺茫相逢漢臯上鞍馬又匆忙我淚狄仁傑君評許子將殷勤一杯酒此去重相望送某學士魯齋天下士髙弟數君侯立學心恆切居官行益修旱苗方渴雨健翮正橫秋尊酒何年夜陳登百尺樓送楊子裕參政赴江西省世契前朝舊臺聨此日同才謀知緩急肝膽見清忠江海風煙裏瘡痍煦燠中太平十二䇿正要沃宸聰夢弟妹有感弟妹飄零久羮墻念慮間相逢應有日比老合投間夢逐雞聲斷心隨馬影還清明寒食近煙雨萬重山順聖溫泉留題有序戊申嵗初年十有七從先大父玉峯靖肅公來拜祀先壠曽浴于此今初獨來父祖俱棄世犬馬亦已四十嗟嵗月之易得懷先人而詠嘆丘山零落堂構多慚因留數字以紀嵗月破塜風霜裏諸孫骯髒邊龜趺埋老蘚翁仲卧荒煙宗邑嗟誰起文源愧我傳一杯清酹底聊與慰重泉為唐佐弟壽兄弟惟君我相看半白頭邇來方聚首今又問行舟風雨山窗夜雞豚石澗秋此期須有日燈火讀書樓七言律詩三次雷苦齋韻二首年前五月與行臺薑公别於太原之三郊爾後初留滯居延者凡八月今始還司苦齋憲副以遊金山寺二詩見示因次其韻復寄薑公行臺鞍馬黃塵已強顔更堪白髮鏡中看曽陪尊俎回春暖正想音書慰客寒勝覽足供詩筆健相思今覺帶圍寬長江一碧橫千里無復秋風細有瀾三仕陪從契分深每髙談議豁塵襟十年腳有隨車雨一片心無徙木金晴雪梅花曽漢上白雲秋水又汾陰黑河沙土揚州月别後相思直到今次男必復韻心頭何事最相關一片飛雲萬疊山去驛隔年才得信分司六月不知還身歸造物乘除裏意在經營慘淡間為報金蘭何侍御别來今已鬢毛斑奉次明叔趙君見寄詩韻嘗擬騷人作問天賢愚誰後復誰前塵冠一拂豈徒爾霜簡千年要凛然自許已知吾計拙並驅那敢子爭先南風雁足詩來好歸思遙生秋草邊次重雲俊公韻山中月影共婆娑發興題詩墨自磨空負有言如鄭直未能遽止似商訛本來摶擊風稜少此去歸休意思多且喜居延凡兩月與君時一到無何壽御史中丞丞相勳名紀太常君侯忠鯁復騰光青宫意注文貞笏白簡風生肅政堂守道自當成豹變擊強初不待鷹揚黑頭事業磨崖頌要共生平日月長白塔遇表兄劉君至元七年吾兄劉公之官謙州爾後初亦從事川陜治漢中漢中去謙州不知其幾千里也用是音信隔絶吾兄又遭際變亂艱險百至乃棄家業挈妻子奔竄南來初未之知也十有七年初奉命有事鞏昌因赴京都道出保定白塔驛與吾兄相遇不覺驚喜如對夢寐吾兄雖精神不衰而鬚髮已半白矣乃舉觴相勞苦吾兄因謂初言余幾死者數矣在患難中每南望屈指數吾兄弟輩如隔兩世將謂不復得會聚矣今見吾弟可勝喜哉但牧之弟尚在淮上不知當幾何時得相見也因泣數行初亦欷㱆歎念者久之且誦向贈别吾兄詩云少日驅馳四海心中年憂樂輒相尋為不誣矣復白兄曰吾兄不愛死艱苦萬里盡忠本朝為聖天子見知此舌尚在功名富貴恐迫吾兄耳别離愁苦之思當掃去乃舉酒上壽作五十六字以侑觴云蜀道山尖上似天謙河雪片大如綿兵塵澒洞七千里音信消沉十一年馬上相逢有今日鏡中驚歎各華顛幾時收拾田園了風雨燈窗共醉眠拜詔五更朝馬簇金溝共待雞人報曉籌萬國衣冠有今日九天宫闕照神州紫泥書帶爐香拆赤羽旗隨日影流一片嵩呼春色裏戴盆何幸望宸旒拜詔次尚書劉公韻龍斾霓旌夾兩階九重閶闔一時開千官花底瞻天拜雙鳯雲間捧詔來生意根荄如啓蟄歡聲朝野似聞雷小臣蟣蝨渾無補願酌春江酹夀杯通明閣千尺觚稜北斗橫一川煙樹冷雲平瀛洲方丈知何在渭水終南畫不成天上碧桃青鳯啄月邊瑶草白龍耕自憐未斷人間夢赤日黃塵六月行子陽李兄與余家交三世矣故於初頗相愛念子陽才踈意廣不屑細務且知時命未偶因放浪於詩酒泉石之間嘗自趙抵淇由洛陽登華山至長安而還得詩文二十餘篇皆名公投贈之什也至元十一年初以事來鎮陽得遂披讀敬書五十六字以發揮吾子陽襟期之梗槩云不是孤髙不愛官只緣行路古來難一杯徑醉從人笑萬事無吾著眼看安得暫離塵夢裏放教髙卧冷雲端此心此話誰能會邂逅青燈幾夜闌贈答商台符玉削青尖太華山君家名勝百年間相公開府今分陜吾子承家又鑄顔詩似晚江晴浪捲心如春水白鷗間自憐南北成何事粗向交情見一斑奉贈虛極劉仙翁聞説秦州地上仙心無一物思飄然雲山想像俱成畫杖屨追隨惜未緣引鶴看花秋徑裏枕書聽雨夜窗前回頭塵土三千丈何處人間有洞天次韻答左丞楊中齋每驚塵慮頓成空曾接君侯玉麈風青眼相看文字裏丹心都在簡書中一時人物誰輕重千古譏評幾異同明日洪都憲司去不能無意失諸公子裕恭政巳還中省公又戒車北上青霞觀花枝欹曲竹勾連中有青眉地上仙清露和香殊旖旎晚風吹鶴更蹁躚只知盡裏今無筆誰信人間别有天呌斷青鸞飛不到黃塵一隔路三千得男必復書來時暑雨拍車頭到日冬煙壓草樓酒為瘴來須強飲書因家逺屢輕投計回蜀道一千里遍走秦川八九州咫尺還司敢停腳西南又入劍門秋挽孟待制駕之有志明時竟不伸士林公議惜斯人秋風斷鴈從誰託老木清霜見本真草草杯盤千里别悠悠天地一丘塵題詩忘却傷心處為是傳家有鳯麟讀汪氏義武忠烈二碑宣慰公初聞之久矣今年夏公枉過余于長安客舍不獲欵曲為恨未幾初以事至鞏昌將謂得奉承言論以償夙昔願見之心也不數日公復以事詣涼州胸中鬱鬱未遂快愜因讀義武忠烈二碑作五十六字書以留之以為後日與公相會之資云矯矯風神義與忠堂堂父子隴西公孤城抗節前朝事萬死開邊此日功上國賢藩俱倚重諸孫此志獨稱雄兩碑讀罷登髙望落日祠堂滿樹風送梁貢父少日騫騰鷹脫鞲牂牁秋色上吳鈎五年直到天低處萬里生還海盡頭尊酒相逢有今日惡懷無復論窮愁此行敷奏蠻荒了合近天家五鳯樓挽陳參卿季淵文源浩汗接元麻詩律新竒自一家人物百年誰鶚表秋風孤劍幾龍沙膝橫坡老敲門杖頭戴淵明漉酒紗恨煞歸來才幾日白楊原上閙啼鴉挽殷僉事獻臣曽扈龍旗北斗傍逺持使節到扶桑性情邃密希前宋詩筆淋漓近晚唐方倚細陳清淚疏不期便入白雲鄉傷心千里燕南道落日鴉啼壠樹蒼次前韻贈雷苦齋侍御倚遍江湖寺寺樓却乘驄馬到西州心如老柏千年雪節似蒼崖萬仭秋公議自當歸宿望時評且莫嘆遲留萱堂強健兒知學底是君侯可用愁送程侍御巨夫一封丹詔九天來御史青驄翰苑才廊廟久勞思稷契丘園初不望鄒枚定知天下無雙士正在君侯此一回自昔楚材為晉用中原麟鳯莫深猜青宫賜教化參政海青瀚海東邊百尺崖崖頭霜鶻矗雲開紅香曉動千官合緑漲春圍萬馬來俊氣共知為異物老拳真見不凡材當時寵錫非無意已有光輝極上台賜蒙固岱平章海青海東青鶻氣凌空錦臂絛籠下九重春水才溶千頃緑頭鵝已落半天風須知神物不易得自是聖皇酬有功丞相黑頭誰與比此心正要答宸𠂻張提刑向尹大興天子以二海青寵錫之未幾拜兹命則知睿眷之有在也於其行作詩以勉之龍旗簇仗暖生煙鷙鳥搏空控老拳萬里風頭飛雪急千官影裏得春偏也知顰笑非徒爾始信澄清不偶然為報山雞莫回首雄心長在碧雲邊吾鄉之崖有以青得名者余嘗取以自號至元十四年偕御史國瑞外郎周卿有東州之行道出閬州閬之南二十餘里佛閣突兀因周覽形勝得河南人王子京青崖石刻不知閬之崖與吾鄉之崖一而二者耶抑海內一家山川脈絡同一元氣二而一者耶或其偶與之合耶乃書此以識遙遙閣道倚空青湛湛澄江練影橫千佛參差半天上四山環合一川平雲間煙火無間地畫裏升平有此行鄉國三年六千里偶於仙苑見崖名留别憲府諸公五年驄馬顔何厚一日天恩愧不任共道相從有知已定交何必到分金兩行清淚三年别一片白雲千里心珍重鳯凰池上客明朝走馬蜀山深寄商左山清明後數日陪姚雪齋張鄰野雅集於匏瓜亭偶得五十六字奉呈左山相公千里一笑麗澤門西十里亭記從别後幾清明梯航遐國歸籌畫柱石中朝望老成滿眼青山連夜夢一尊明月兩鄉情花時更向東臯醉腸斷雲間百二城
