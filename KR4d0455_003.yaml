body:
  text: 青崖集卷三元魏初撰詩餘木蘭花慢為安總管夀記鳳凰城下走飛騎扈龍舟正春水生波頭鵝落雪風偃貂裘西南憲司髙選自并汾以去數君侯處處隨車有雨行行白簡生秋今年冠蓋駐梁州民物沸歌謳看緑水平田人家烟火桑柘鳴鳩輝輝虎頭黃莭道看看飛下日邊頭儘把中原山色與君同醉南樓又為姜提刑壽記當年分陜擁飛蓋入長安把渭北終南秦宫漢闕都入􅑀欄追隨大渾幾日又嘉陵山色上征鞍楊栁離亭痛飲梅花樂府新翻一封丹詔五雲間全晉動河山看匹馬橫秋弦轟霹靂虎卧斕斑生平此心耿耿道君恩未報敢投閒袖裏升平長策春風咫尺天顔又為完顔振之壽笑功名謾我都幾許競匆匆記玊佩紅鞓長安陌上人指青驄歸來買田故園儘人間社燕與秋鴻喚奴拏魚溪上看兒種豆村東算來何物是窮通只有讀書功愛杖屨風流崖西古石舍北長松宦塵千丈如海更何心鞍馬避奴童萬古醉中天地井蛙湖海元龍又為馮副使壽記春風門巷騎竹馬舞青衫笑我拙何堪君才十倍頭角巉巉讀書故都喬木更含香蘭省並歸驂醉聽灤河夜雨清吟太液秋蟬别來何物是新添霜入鬢毛尖正渭北江東莫雲春樹得共新銜人生别離居半但公餘有酒且醺酣幾日鄰村桑柘夢中烟雨江南又宋漢臣墨梅并叙嘉議宋公於豫為世契兄向過洛陽吾兄適宰是郡尊酒留連者纍日邇後訃音至長安余不勝驚悼今年以事來京師其弟義甫祕監會余於東溪出示嘉議墨梅橫幅因作長短句一章兼致區區追挽之意云愛筆端造化春不盡思無邊看詩意精神不求顔色物外神仙回頭水南水北覺氷姿玉骨却悽然一片肝腸鐡石三年雪月情緣洛陽尊俎記留連慷慨正華年恨鞍馬匆匆長亭老樹芳草離筵西風鴈來何許忽傳將幽恨到重泉昨日東溪再過不堪塵滿氷弦又次韻奉答劉雪溪兄記漢臯亭上從别後幾秋風愛詩酒追隨衣冠雅重車騎雍容回頭白雲汾水又傳將淮海避青驄官府年來有禁音書未易相通肝腸如鐡氣如虹佳句入清雄問渭北江東莫雲春樹此意誰同虛名百年慙愧賴吾鄉風味近河東幾日鳳凰山下雞豚社酒迎逢又贈閬州揚宣撫問髙城鐡甕緣底事淨妖氛道霜落長安元戎閫令萬騎雲屯人人知自有用望金湯直上撼乾坤海陸鯨鰲掀舞秋風怒捲孤豚將軍却恐熾炎燻玉石到俱焚便立馬城頭扶傷弔病不侈竒勳區區蠆鋒螳臂算從今都合平吞一片旌旗間暇夢魂常繞夔門又送張夢符治書赴召正江南二月春色裏送君行對芳草晴烟海棠細兩不盡離情思量漢臯城上共當時飛蓋入青冥醉後嘉陵山色馬頭楊栁秦亭十年一别鬢星星慷慨只平生愛激濁揚清排紛解難肝膽崢嶸此心一忠自信更太平丞相舊知名寄謝草堂猿鶴移文未要山靈石州慢留别雷御史才得相從還有此行難合交錯公餘頗喜新涼杖屨頻承談益白衣蒼狗不如付與無心到頭誰是真功業天地儘知音足清風眀月應惜枯罷未脫瘡痍鞍馬不嫌驅役筆底清霜隱隱巳沾鬢髮秋風萬里飄颻老鶻摶空鷦鷯尺鷃甘沈沒開嵗待君來滿江南春色又次髙郎中道凝韻千古汗青勳業幾人能是雄傑麒麟畫像當年轉首許多除折前村月底一壺春酒追隨梅花解軟肝腸鐡萬事儘悠悠只固吾窮節愁絶倦逰嵗莫棲遲風雨一枝鳩拙意廣才踈事與古先殊别夢中鄉國間時獨上城樓角聲旗影供凄切醉裏倚闌干滿西山晴雪滿江紅寄何侍御少日肝腸雲夢地氣吞八九今老去才踈計拙百居人後倦處收回行路腳懶來噤却吟詩口算從前四十九年非如回首風與月須長久誰放我成三友笑官倉紅腐可堪癡守倒鳳顛鸞吾已矣淋漓醉墨蛟虬吼儘都門冠蓋擁紅塵青青栁又寄何繼先御史落日何山人好在鳳凰城闕還記否長安城下一杯離别芳草連空春欲暮落紅千片飄香雪憶使君昨日出潼關今三月吾有意從君說君為我能周折想臺中評議正勞提挈走馬秦川塵土裏離愁一似年時節問白頭老母倚門心何時歇又為書史王慥甫壽年少才華文字裏已曽相識還又喜柏臺髙選我承飛檄筆底輝輝多古意幕中隱隱當勍敵更今年相從入川來良多益心與膽當如后須不負文章力要他年事業轟騰霹靂自覺空踈成底事愛君文雅吾平昔把清江都與釀成春如鯨吸又為雙溪丞相壽借問中朝誰得似相公勳舊記前日風雲慘淡雷霆奔走萬里野煙空緑樹旌旗莫捲熊羆吼便挺身飛出虎狼羣人能否元自有談天口初不負經綸手更詩書萬卷文章星斗樂聖銜杯應暫耳不妨桐院間清晝願壽杯青與北山松俱長久又為張右丞壽二首梁甫孤吟已認得真龍頭角記當日江山如畫一時英略立馬便談天下事鳳池十倍揚州鶴更詩書萬卷浴心胸無丘壑活國手千金諾自不負麒麟閣算㸃鞭餘事不妨清酌今日文昌虛八座鬢毛莫遣星星却要袖中霖雨洗乾坤浸寒廓天造雲雷問誰是中原豪傑人盡道青錢萬選使君髙節自有胸中兵十萬不須更事張儀舌看千秋金鏡一編書心如鐡天下利君能說天下病君能切要十分做滿黑頭勳業樂府新詩三百首篇篇落紙揮氷雪更醉來鯨吸捲秋波杯中月又登汪師展江樓次張周卿韻落日江樓山不盡亂雲橫碧還又見人家煙火倚天青壁貔虎夜攢分逺近魚龍人海無南北道軍門昨夜有人來傳佳檄歌慷慨余平昔今潦倒嗟何及幸此身膏沐太平文德方喜詩壇逢老手却愁酒陳當强敵便從今都與捲降幡知吾必水龍吟為祖母太夫人九十之慶玉峯千古髙寒浮花細葉難相稱風流不减謝家林下藹然輝映最關心處嵗時伏臘蘋蘩薦敬笑人間兒女那知許事空脂粉香成陳慙愧兒郎草草滿金杯緑浮春瑩此心但願旁沾親舊年年康勝一曲龍吟又傳佳語尊前試聽道期頤未老十年今日再安排慶又余誕日不得與兒子必復相㑹聚者凡六寒暑矣今年是曰必復以詩上夀有勇退神仙今不逺之句因以此曲示之平生翰墨箕裘誤䝉獬豸分司早登車攬轡風烟萬壑連雲鳥道五載歸來中臺無事江南芳草記錢塘門外西湖湖上登臨處知多少夢裏五雲樓閣正瞻依玊墀春好南海隂風越臺暑瘴不禁懷抱白粥青虀平心養氣萬緣俱掃便從今收拾黃牛十角只閒中老念奴嬌為王約齊紹眀夀離騷痛飲問世上功名畢竟何物眼底誰能知許事只有雙鳬仙客一局殘碁兩窗踈翠談笑揮氷雪紅塵千丈定知不到雄傑昨日黃菊籬邉淵眀招我逸興悠然發今日秋香猶好在請對玊芝仙骨富貴謾人雲翻雨覆枉換青青髮不如髙卧浩歌且醉眀月沁園春留别次張周卿韻自揣平生百無一能此心拙誠甚年來行役交情契闊東奔西走水送山迎遙望神州故人千里何意今年共此行瀟蕭雨算幾畨茅屋燈火殘更從教長路欹傾拚一醉都消磊磈平向白雲直上君吟我和緑波江畔我唱君賡恰到相逢又還相别慙愧人間功與名長亭外望野烟春草不盡離情又送霍國瑞雞舌濃香朝馬晨鐘十載禁庭恰行春緑野從容冠蓋人家烟火相望升平一夕霜臺又頒新寵白璧青錢到姓名人爭道看春風袖裏霹靂抨轟誰憐漢水孤征得旗斾相從有此行愛風流凝逺長歌細飲青燈夜語欵曲交情恨煞文書官程未了又到殷勤唱渭城百年衷算悲歡離合幾度長亭又次張可與郎中韻可與郎中與晉卿德昌以樂府相唱酬不揆奉次三子追隨文筆崢嶸相如上林正遙山雨過嵐光湧翠平湖風起天氣行金老我何堪頽然於上得共停舟賞此音髙歌罷似千山月冷萬壑龍吟玻瓈莫厭杯深儘塵土機關苦用心對湖山如此安能不醉交親知己何處重尋慷慨中流闌干拍遍離合悲歡一古今眀朝去向滕王閣上暮兩孤斟水調歌頭送張夢符一代橘軒老胸次浩無窮當年比度元李氣象鬱相同况是文章翰墨濈濈龍拏虎躍又得復齊公俯仰想前輩風采照區中羡君侯三尺劍六鈞弓風雨墮地奔走齷齪笑田翁今日衣冠華選前日龍門桃李歌咏入清雄看取次回去奏論大眀宫又喜雪南國晝多霧大是寫真詩今年何許風色吹作雪花飛人道使車剛節我道使車和氣此語未應非簿案儘叢雜梅竹復參差釣魚君今老矣復何之人傳日邊消息四海入皇威况是髯張癯霍偶有相逢今日時更吐竒辭朱子有佳酒連為倒瓊巵感皇恩次商參政韻睡起獨登臨不禁殘酒樓上闌干壓晴栁好山凝望良足慰余心友風烟春近也平安否畫㦸朱門誰堪炙手茶社詩盟要長久年來和夢無復東奔西走麒麟新畫像從渠有鷓鴣天次姜御史韻雨過雞忩覺夢清文書一束五更燈愁於飢鵠癡於鶴間愛孤雲靜愛僧人似月酒如澠幾時别墅醉秋登髙情千古閒居賦世故驅人不易能又九日晉溪何處龍山事不偏晉王祠下水浮天參空鐡樹三千文刻石名臣五百年歌浩蕩酒如川暫陪珠履對風烟自憐白髮無能事只有丹心在日邊又霍國瑞母八十之夀少日教兒苦讀書只今驄馬到亨衢鏡中雙鬢秋難染膝上諸孫玊不如花淡淡竹踈踈風流好箇夀星圖平安日月從今數百嵗平頭儘有餘又贈王敬之御史耿伯玊臺掾去嵗新秋别鳳城今年春早會秦亰人生離合知難定客裏相逢重有情花淡淡栁青青半風半雨若為平清眀得暇還相覔醉倒沙頭碧玉瓶又室人降日以此奉寄去嵗今辰却到家今年相望又天涯一春心事閒無處兩鬢秋霜細有華山接水水眀霞滿林殘照見歸鴉幾時收拾田園了兒女團圞夜煮茶江城子為祖母夫人八十之夀如兒花額粉香勻㸃粧新看來真八十風流都屬太平人長日煙琴一曲瓶水暖麝煤薰酒烘仙頰暈微醺洞庭春要平分兒女團圞語笑重情親更看藍襂紅袖舞歌婭姹小諸孫南鄉子贈友人一别五雲城慙愧朝陽有鳳鳴奔走幾年成潦倒堪驚底事能傳萬古名猶記少年行可慣清樽獨自傾昨日東岡歡笑處誰醒吸盡人間竹葉青定風波長日身邊一事無放癡兒子走相扶不道牽衣緣底事笑指杖黎門外看平湖好借西鄰霜羽鶴更著青松和月兩三株一片春風千古意請倩取龍眠作箇夀星圖朝中措為寒仲山僉司夀五年憲府記相看秋水淨門闌一曲驪歌别後眼前萬里河關愛君佳處文書堆積意思安間看取清秋射虎短衣匹馬南山清平樂祖母夫人夀珠圍翠繞塵土知音少一曲清琴松月曉兒女肝腸容了歌聲不用琵琶銀杯細斟流霞嵗嵗而今時候小溪晴雪梅花太常引党氏園亭紅梅次徐子方韻亭亭清瘦阿誰鄰合占了百花春蜂蝶漫成羣只山煙淡月最親舊家窗戶精神好在紅簇麝香新有酒到吾唇便拚作花邊醉人人月圓為細君夀冷雲凍雪裦斜路泥滑似登天年來又到吳頭楚尾風雨江船但教康健心頭過得莫論無錢從今只望兒婚女嫁雞犬山田㸃絳唇次商台符韻送何侍御昨日郵亭樹頭一帶青山晚緑波清淺人與天涯逺今日相逢緑蟻新醅滿歌聲斷落紅零亂夢逐春來鴈又為孫叔庸夀月底秋吟愛君星斗銀河句拍江風雨認得回舟處十角黃牛曽是生平語相將去緑雲千樹作箇菟裘計浣溪紗為劉歸愚夀前輩風流有幾人拚教詩酒百年身小紅燈影近新春醉裏看花城外寺閒來課種水南村人間百僞不如真又心地寬平見夀徴鬢鴉勻薄只青青從今却是數松齡除却弄孫無一事閒時針線困時行小兒新語喚文苓又燈火看兒夜煮茶琴絲香餅伴生涯秋霜原不㸃宫鴉十月好風吹雪霽一天春意入梅花夀星人指是仙家序遁齊先生詩集序先生諱元節字子元遁齊其自號也𢎞州人渾源劉南山翁以女妻之傳其賦學中進士第雅尚氣節不隨俗俯仰仕至密州觀察判官既罷即逍遙鄉里以詩酒自適年五十餘以卒壬辰北渡元遺山名重一時於入品於文字毫髮不少貸嘗收集中州名士詩文先生得與其選且為之傳故先生之文行於是乎公論定矣其孫振伯起至元十九年敕授江南浙西道提刑按察司經厯以亷幹稱二十三年㑹余於杭以余有鄉曲之舊頗相愛念因以先生詩集見示古律共若干首余謂金國百有餘年以文章名家者如党竹溪王黃華趙黃山楊趙二禮部雷李王麻諸公不啻百數十人其餘為兵亂磨滅者不可勝計今伯起收集先世遺文以為子孫傳其意亦有足嘉者嗚呼衣冠之後有不得已在胥吏在商賈在農工卒伍者知其有先業之美而能繼起之是又吾伯起之心也故併書之其年五月順聖魏初引送殷侍郎獻臣使日本序唐殷侑使回鶻韓昌黎謂曰今人適數百里出門惘惘有離别可憐之色今子使萬里外國獨無幾微出于言面豈不真知輕重大丈夫哉又謂士不通經果不足用初嘗以是謂凡受命于朝者無得失利害必盡夫公而已一有計較則私矣今天子仁聖克肖天德際海內外罔不欲覆燾至元三年既受諸國朝賀將遣使諭日本用敷宣聖意命朝臣擇其人宰相以今殷君侍郎應其選制曰可京師去日本不知其幾千里也殷君受命言笑自若用是知殷君能審輕重者矣通經術者矣公無私者矣非其侑之後身必有以得侑之心者矣然則通烏氏開身毒置交趾郡不患其不能辦也燕大夫士咸有歌詠順聖魏初為之序云素庵先生事言補序太上立德其次立功其次立言自世變不一有委心於權謀謂之知死心於勢利謂之通苦心於雕蟲篆刻謂之文故立德者鮮立功者鮮立言者亦已鮮久矣嗟乎士君子所以垂憲於後顧所學何如耳遇不遇不論也素庵楊先生少羇孤致力古學為名輩所推重嘗著事言補三卷至元二十五年其壻陳祥觀農江西以其書示初請序所以意初年十六七時曾侍我先大父玉峯得拜先生於木庵英上人之歸義方丈今四十年矣先生有獲麟詩二首蓋其明年之詩也初晚生不肖誠得附名不朽何幸如之今考其上篇如曰以儉養福以謙養貴以知養富又曰五就湯五就桀非孟子之言也其中篇如大學衍義節有七例其所謂筆削者蓋有為而作也此又見諸行實非空言比也其下篇如酒癡之論如人妖鐡面之譏舉可以為世訓士論惜其遭際變革羇旅隱約使先生之藴蓄負荷百不一施雖然有所為不亡者存焉耳其自序謂書勸戒蓋學孟子亦不異於歐陽公也有能識先生之志採先生之言其於事功不可謂無補至於論文字紀風俗逺讒嫉安困窮先生雖得而録之非有意於文也茲又不可不察順聖魏初謹序山莊雅集圖序古今一天地也人物一元氣也元氣一古今不可以二故山隂蘭亭之集春夜桃園之宴竹林七逸洛下九老雖巨細不同其託物興懷自得天地之妙者豈以古今有二哉至元丙戌馬卿德昌拉諸賢出錢塘門或舟或騎要以陳氏山莊此君亭為約既至亭在萬竹中軒户足清杯盤足古酒數行談議蜂起笑謔間作觴猛於陳詩嚴於律薰陶浹洽其氣象有大不凡者明日諸公咸有樂府以歌詠其事又令子昻趙君圖之且囑余序所以意余謂湖山拱秀花竹呈麗此不必論第我輦所以自立者其一於古其不一於古余於是有懼焉敢序因以例和樂府附之送尉生序雲川尉生從余學將歸覲其親求余言為佩服之資余謂古之學者自小學入於大學自格物致知以至於修身齊家各有叙程朱兩先生於語孟中發之詳矣苟能熟讀而力體之古人不難造也生其勉乎哉先儒謂教人者如醫家對病用藥若曰必揭其受病處從而藥之生亦質美嗜學而謹於守畦畛者也余不能言余嘗以書獻當路者其自謂則曰讀經以治心為主不泥章句讀史尚氣義不喜敢死怪力之士作文先大體主意而鄙雕刻涉世貴知義有守而恥不通此余所願學而未至者也今亦以告生生其勉乎哉送尚秀才序厥初生民倥侗渾濛雖秉彞罔不在越匪修弗率未有不替於天性之初惟彼玉石既切復琢茲用異于塊礫惟彼箘楛既括復羽茲用應于機張惟彼稼穡既耰復鉏茲用望於有秋若古有訓黃帝堯舜氏作其政一其民醇其學罔攸顯道亦無不在逮文武成康人民匪彛防慮周逺越百姓里居罔敢不敬天德惟稼惟穡朝夕克服厥躬間於藝穫時則有若庠序有若老成詢茲大倫不暇他以為不惟不暇亦不敢周德既衰重耳小白迭為盟主沽功府利誕惟厥縱于匪彛其後有國立王亦罔克念聽則或専於兵於刑於權謀於鈎距於捭闔於縱橫於鬼誕於貨於佛於𤣥百孔具出於是先王大道泯泯棼棼日入于壞學者尚賴六經孔氏之學僅存而不泯以仰鑽髙堅用明天命俾知所止定恆懼寒暴因乃畫簣于一為可惜也保下尚野從余學今將歸獻書求余言余聞曰勤力一心乃其有成作止交戰危微孰明爾尚式時先民之訓夙夜惟厲華其末必植其本圖其始必思其終慎厥攸好爾克敬在德余惟汝畏酒壺既傾序以識别送王之問序古所謂天民大人者一於道義而功名不論也志於功名者富貴不論也世變既降士氣益弱天民大人即不敢論而所謂志功名者尚邈乎其無聞焉是以竊位苟祿之譏偹員全身之謗往往有之茲感激之士所以痛心疾首有不能自已者然也吾友王君之問肅而剛約而有文在今賢相君廉公賔席有年矣至元嵗丁卯將拏車詣京師余恐其遭罹頓挫遂有落寞不平意於其行乃飲之酒以張其氣且與之言曰廉相君方以天下為已任故雖荒僻窮陋一有竒俊猶將搜抉欲共升之朝况其美材巨璞已在其宇下者乎吾子可毋慮所慮者惟吾子去就之當否與持心之變與不變爾就之不當而富且貴人孰以為榮去之當而貧且賤人孰以為辱世之苟得患失之士泛泛踽踽脂韋囁嚅若水中之鳬若轅中之駒若饑龍之乞憐何沒沒敗人意如是耶吾子懷抱利器有賢君侯為之依歸持此心以往能不為風俗所移易功名不難辦也吾子其行矣送王國賔序君子非無名之患無令名實難名身之文也言名之輿也言之不辟名之不逺宜哉昔叔孫豹有言太上立德其次立功其次立言德上也功次也言又次也咸無焉為衆人生為五榖蠧死與草木朽何沒沒也夫或曰言以駕說者也學者將務駕其說則冥行擲埴道莫之索其次用何如也曰中天下而立定四海之民君子樂之存乎命故堯禹躬行仲尼皇皇非命乎非命乎堯禹不言之孔子孔子能言之堯禹非堯非禹余以春秋論語為贅疣棁之藻童子之雕刻施之天下壯夫不為末也末可勝乎是以華而不實蕩而不法君子耻諸余友生王子國賔有志于言將以是鳴于世者也余願子以孝敬為冠屨謙讓為襟帶中庸詩禮為佩服則其言之出也鏗乎球琳琅玕之戞焉燦乎絺綌錦繡之錯焉於以補造化於以變風俗於以參天地之盛衰不然何名之多言足貴哉子行矣他日有遨遊諸侯間氣象熖熖者非子而誰送歸愚劉丈尹新河序近代用人之法不過曰資曰望而已資以御其常望以御其變常者有司之事變者宰相之公知其變不知其所謂常則鳳鳴而鷙翰顔狀而跖心者得冒進矣則夫拔於稠人之中任以不次之位非明眼者不敢遽以旬月取相一歲纍遷者為至當故范文正公立朝抗論置百官圖指示曰某遲某速此公此私意者范公不敢一於變而必為之防限者杜私門抑干進為後世定法也知其常而不知其所謂變則一枝棲鸞百里不足展驥足者亦有之矣則夫積日纍久循序平進非體道者不敢遽以十年不調七十為郎者為至公故冦忠愍公當國除拜見吏持例簿進却而弗視曰宰相器使百官若皆用例非所謂進賢退不肖也意者冦公不敢一於常必為之振舊革弊古者取人才求實用從當世之公議也大抵用人者不可不安其常而亦不可拘於常安其常而不知所以時出其不常之用以神吾之常則其弊也不可止國初法令簡易將相大臣皆得以意辟召逮中統至元之間肇定銓格俾循序而進久變而忽常人固以為駭方常而遽變人亦以為駭噫當是時器使百官吾知其為難矣雖然銓格既定因其有常才者待之以常因其有非常之才者待之以變從施橫設無往不可顧吾所自立者如何耳無患其坐廟朝為天子進退賢不肖者不能也五叔歸愚劉君才而望者也今循序尹縣屈而不伸蓋可知已雖然孔子嘗為委吏矣必曰㑹計當而已矣常為乘田矣必曰牛羊茁壯長而已矣孔子盡其在我者在人者不論也人以常待我我以常處之則人之待我者非不善也人以常待我我以不常處之待我者當必有能辨之者矣方今郡縣之職非若曩時也有養廉之餼有奉祭之田有皂𨽻以供役使有考課以辨能否是豈可不上為天子下為斯民而中以伸吾之所學乎然亦有所謂難者不可不知也荒逺細民知天子有意于治懼司牧之非其人以撓吾民生將悉其情而升黜之用是豪猾不逞之徒苟在任者一有棖觸則舞文欺詆必排擯而後已不然即俟其滿秩之日羣聚譁譟遮道而訾辱之噫風俗如此任是責者急之則民怨興緩之則公賦缺不謂之難可乎雖然亦必有道以持之公平廉斷與物無競不以近而動者吾知其不足辦矣若一為猾吏所餌左右不敢舉動良可惜也吾叔當代名士是固能審處矣而初屑屑以言此者蓋以立法有常執法者雖以常待吾叔初不敢以常待吾叔也宰相所以造化是法者也雖姑以常待士初不敢必其終以常待士也幸吾叔不以常自處則宰相自不能以常待吾叔矣異時聞新河治最宰相奏白不敢以常尹長遇之然後知初言為不妄也於其行謹以是序送之藁城尹關君哀挽詩序至元五年三月朔藁城尹關君子玉卒明年其孤子某泣謂初曰先人少遭閔凶挺身自樹立行唐邸侯尤器重之嘗薦於故蔡國張公張一見大喜命典屬縣先人辭不就即杜門却掃彈琴學易淡然與世味相忘若將終身焉者中統壬戌順天宣慰趙公辟先人咨議其事先人從容贊畫不求赫赫名用是厯曲陽髙陽藁城三縣令所在有能名今不幸棄世不得展盡藴畜寧為無遺恨邪某早夜思所以慰藉九原者惟是縉紳先生之哀辭有所闕耳先人雅重吾子幸吾子序其端初聞愕然且謝曰令先大夫不以初不肖頗相愛厚嘗命初為邸侯作北嶽露臺記間與語喜道河朔諸將事迹且曰某少時不學好騎射貞祐間河北豪傑並起某時因邸侯數相與往還用是得其事迹為詳每念古人遭際草昧功名事業播在人耳目至今不朽者以其史傳為考實故耳今國家立經陳紀百度修舉他日太史氏必求訪遺逸某將封諸將事實以獻不識何如初應曰昔韓昌黎以李翰林所為張巡傳雖頗詳密尚有闕者又不為許逺立傳愈痛之為作張中丞傳後叙具載巡逺事垂不朽又有答元微之侍郎書論甄逢父濟卒不汚祿山父子宜得書初嘗以是推愈心知其賢于人者益逺夫忠義感激之士魁巍偉雋之迹要當與白日爭輝不幸一旦磨滅而不聞豈不深可惜也君能擴推是心則他日登要津秉國政必不肯蔽賢以自售比之聞人之善頷而下咽小有過必極口暴露而後已蓋相去萬萬也别後方期大用以展布所長不意遽有此不祿今吾子將懇求縉紳先生之哀辭以為泉下之光是亦吾子之職分耳初聞令先君與藏春相君最相愛念相君名重天下衣冠所倚望此正遺山所謂鄴中賔客應劉徐阮皆天下之選使坐無陳思王亦不得不為西園清夜惜也初敢為吾子發之初再拜序記江漢堂記堂在漢中其始構與構之之所在今不可考其字則魏了翁之所書也了翁宋名士其所以書必有以也聖元有漢中幾五十餘年名公巨卿典是郡者非一能不棄了翁之所書揭之於公署之後堂亦必有所取焉耳第以歲月逾邁風雨頽圮一往一來或未知其所以然為雉豕蒿礫所溷雖漢中士大夫不知有了翁之書者况究了翁之所以書者乎至元十四年陜西四川道提刑按察副使安公士甫以才得尹是郡乃葺其堂而了翁江漢之名始出余適以按核至公與余有一日之雅俾余記所以意余不敏不能度公意敢私為之說以詰公曰絲簧夜燈錦綺春麗觀游眺望公豈有心於茲堂乎燕間休息賔從雜坐談說蜂起公豈有心於茲堂乎㑹計出入毫髮不少貸一豫一奪籠絡豪右公亦豈有心於茲堂乎不爾則必曰田菜多荒粟帛不給吾於此堂可以議之賦役煩重因仍蠧食吾於此堂可以治之羣小並進以私害公吾於此堂可以去之英俊下沉文治不興吾於此堂可以舉之㷀獨抑鬱無所控告吾於此堂可以信之說未更公竦然曰詩所謂他人有心豫忖度之君之謂也余徐應曰公之所以葺堂之意今竊幸中之公知了翁所以書堂之意乎敢併為公陳之江自岷漢自嶓冡淵深渟蓄湍激奔放源源混混不舍晝夜雖百折必至於海蓋天地之元氣流而為江漢元氣餒則江漢涸江漢涸則乾坤幾乎息矣人心之有義理發而為事業其揆一也義理明則事業著事業不著由人心勝而義理之心塞矣故一心之公一心之江漢也一言之信一言之江漢也一行之謹一行之江漢也苟反於是則旱乾枯竭無復生意矣與夫秋之溝夏之港朝盈而夕涸何以異哉知天地之有江漢當知了翁之所以取名於江漢知了翁之取名於江漢當知吾身之自有一江漢不可徒羡夫鶴山之書劄而已也公拱手曰君記竟矣請書之吾將從事於斯趙公泉記趙公家世將種在金朝父祖昆季咸有戰功死王事者數人公幼業儒學不窘逼章句卓然以逺大自期上在潜邸公與亷趙姚張諸人偕入扈從主上龍飛詔公宣撫陜西四川等路朝廷草創百度未偹况西南國都之門所以蓄內釁而啓外侮者人莫不以為懼公至具言天子聖明宣布渥澤以恩以威雖以杞子逢孫之黠悉縮脰於殼而莫我敢發卒致內外帖然使主上無西顧之憂者公之力也由是公之名重天下將謂謨謀廟堂佐天子出號令旦夕可冀矣公乃中流勇退買田以泉石自娛得古夏侯氏之地在長安韋杜之間負少陵而揖終南雲烟竹樹錦綺錯繡四時朝暮光景萬狀昔人所謂輞川之鄉社桃源氏之别墅者正在此也初公既得卜乃引東澗之泉以溉蔬藥以供庖丁之用又鑿池植菱荷養魚數百尾每四五月之間旱輒細流淙淙僅濡石齒而已則所謂小有江湖之興為之索然用是瀕北崖以鑿之有泉湧出如隙光如匣劍􅒂然清泠厯引而南由書院由蔬圃由堂由池隨所用而之焉當暑潦方漲亦奔湧湍漣有聲舞盤渦而蹙輕浪甚可愛也及其風定烟收淡如醁醽雖云智者之樂而禪僧野客亦有所慕焉公時屐履其間居人望之若神仙焉因以趙公名之初謂古人以人取名者多矣如柳子厚之袁家堨蘇頴濵之君子泉皆是物也夫其以袁家名堨者必袁氏之有主乎堨也以君子名泉者必其神之有類乎君子也今士大夫以公名是泉公亦以泉受是名其必有說也士大夫之說余能知之謂公嘗少攄底藴而秦中百姓至今歌舞之使其執大柄輔大政其潤澤天下也必矣庶幾公之後出得若是泉以平天下之欹坎以潤天下之枯槁以流天下之穢惡以鑑天下之妍醜此其所以望於公也然公得是名而不辭不能無疑因以詰之公曰余以丁內艱廬丘隴朝夕哭踊比得痺疾自分間退久矣然所以自治自勵者奚可少怠余觀夫泉之就下不爭則似謙不幾於顔子之不伐乎盈科而進則似約不幾於曾子之養氣乎蹈險不疑則似勇不幾於季路之有為乎源泉混混不舍晝夜則似道不幾於君子之自强不息乎古人盤盂有銘几杖有銘若韋若弦皆所以自厲也余之得是泉而喜之者亦將以是自銘也不然則役於物而急於名是以巧智自私余不敢為也初謂泉一也士君子得之而所以期公者如此公得之而所自守者如此然則君子之所以必觀與夫觀之之有術者於是為益信公諱良弼字輔之本恤品人家贊皇者四世矣今占籍於茲焉重修懷州三皇廟記太醫王某詣初言懷州孝感坊舊有三皇廟五間蓋壬子歲州醫教授趙元張淵管勾張嗣興所創也迄今四十餘年矣至元乙酉某承太醫院令造供御地黃於其間某謂奉上藥物不敢不精潔且三皇醫之所自出也其廟貌圮毁踈漏如此甚不稱輿望乃與本府官及醫生輩相與重修之凡用緡若干雖木石已具未遂落成某今年供上赴北太醫院以茲事奏聞欽承睿㫖俾有司施行請紀其始末以詔不朽初竊為伏羲氏法象天地畫八卦以通神明之德以類萬物之情神農氏教民五榖嘗百草木黃帝與雷公岐伯論討經脉旁通問難經方問說之書出焉醫之有本不於是以求之將何所取衷焉可謂知本者矣雖然子醫也知醫之本於三聖人當知三聖人天下萬世之本也太極未分而竒偶畫隂陽而無窮隂陽合變而萬物生理亦無不備不有聖人孰明是理孰體是物孰為之垂教萬世由是觀之萬物一五行也五行一隂陽也隂陽一太極也太極即此理也此理明則天地位而萬物育故厯代祀典所在官司歲時致祭昭其本也聖上慈民愛物與天地為一心與三聖為一體凡在有司可不體聖上之心發三聖人之妙用其司牧天民順其心不强其所不欲寬其賦不迫其所不為不奪其時不困其力使之雍雍有親嶄嶄有義長幼有序內外有别養生送死一無所虞則隂陽安得不和風雨安得不時百榖畢登鳥獸草木咸若當是時也三聖可以四皇可以齊乎三矣是豈止補榱棟炷香火為醫者所自出而已邪雖然亦不可謂不因吾子輩啓之也謹記重修磻溪長春成道宫記至元十七年重修磻溪長春成道宫成提㸃方志正具筠溪李公之狀以文來請謝不敏不獲按所具狀磻溪在鳯翔虢縣界一泉絶清泠北流二十里入於渭層巒疊嶂秀異如畫初入谷口甚狹㳂溪五六里豁然塏爽土膏腴而樹蓊鬱雲烟朝夕千態萬狀使人顧揖之不暇所謂尚父之釣磯者在焉其曰磻豈非以是而得之邪始重陽王公寓寧海馬氏棲霞長春子知其為異人往師事之得心傳焉又二年與丹陽馬公長真談公長生劉公從重陽公遊汴未幾重陽厭世長春與三子護葬於終南之劉蔣村長春以溪形勝慨慕古昔因占居焉洗心鍊行深造自得時作詩以開示元祕用是名聲藉甚大定二十八年詔赴京師築館于萬寧宫之西以便咨訪明年乞還山從之明昌辛亥東歸棲霞又二十有八年適元太祖聖武皇帝遣近侍劉仲祿召至雪山之陽虛席以問至道對以寡欲修身之要愛民永國之方及上天所以好生惡殺之意上皆嘉納之是時干戈方殷賴是以全活者不可以數計古所謂仁人之言其利漙哉蓋近是已又四年敕居燕之太極宫即今長春宫也又敕悉主天下道教事又四年乃羽化又十有一年弟子洞真于公住持終南重陽宫感念磻溪祖師鍊化之迹兵亂蕪沒召盧志清輩經度之時關中甫定土荒人稀艱於得食磻溪當東西軍旅往來之衝志清輩披荆棘剃草萊修垣墉力耕稼數年之間棟者宇者楹而礎者始有可瞻仰而定居矣乃額以長春而觀焉又十有四年真常李公代禮嶽瀆炷香祖庭以恩例升觀為宫而得今名焉志清即世道士方志正繼述其事志正有幹局能自勤苦刻勵以倡率乃衆構大殿三曰玊虛曰通明曰太宗玊虛之南太宗之北曰南昌曰方丈自餘細大各有攸處嗚呼如志正者可謂篤於向道有志而竟成者也雖然是溪之在太古荒寒寂寞與山川天地為一氣初無名知也及尚父奮起佐周以有天下立齊與周相為終始當斯時也君子謂如羲皇至於唐虞文物始偹可謂溪之治世矣自周自齊厯漢魏南北隋唐迄於五季幾二千餘年遂寂滅空洞不復有大賢者出君子謂溪之復太古也亦宜自金大定至于今百餘年有長春公積德纍行開闡元化風行四方以人主之尊猶物色而招訪之雖逃虛而樂山林一言可以利天下不憚煩也用是人人想望其風采至今髙其德而不忘當斯時也君子謂如宣王勞來安集光啓前烈可謂溪之後世而中興焉又謂自今至于百世萬世溪之復古不古或益張熾光大則存乎其人焉至於丹艧粉碧上觚稜而棲金爵是又吾長春子之甘棠云敕建真武廟碑記國家肇基北方以神武有天下厯聖承承際海內外罔不臣妾主上眷膺天命嗣守大統稽考典禮以潤色鴻業立宗廟議禮樂定官制炳然蔚然文物一新惟是宫殿未備羣臣請定都於燕上可其奏逮至元年始敕有司經度其事議逺近略基址平板幹具餱糧分功命日以肇建都城既役之原缺年十二月庚寅城之西髙梁河有蛇出焉長尺有竒首金色觀者以閉藏之候非所宜出乃今見之其為靈惠也昭昭矣咸奉香迎拜蛇馴而近人引頸顧盻領其誠意而去明日復有靈龜回旋岸曲金文燦錯衆悉以為神太府監玊牒齊布哈以其事達禁掖皇后俾詢之博物者曰是何祥也或以𤣥武神現為對皇后雅欽神靈即命於所現之地構祠而像設焉有司方庀工蕆役皇帝若曰神能大庇吾民可不敬錫明享以答靈貺乃詔大其棟宇以行工部尚書假某董其役仍以詞臣文其石謹按張衡思元賦云元武縮於殼中騰蛇蜿而自紏蓋蛇龍類陽也上應乎乾綱龜元物隂也下應乎坤軸惟隂陽交和而神應斯至今主上神慈威武子育億兆沉幾開闔旋乾轉坤其創制立法則有魏孝文之度焉其綜名核實則有漢孝宗之則焉至若覲光揚烈以辭色假借臣下使之敢言則周成王唐太宗不啻過也加以敬戒不怠肅恭神明宜上帝降靈以表彰德信而昌明景祚於無窮也臣初敢百拜稽首獻銘以對揚天子之丕顯休命銘曰元武惟星黑帝之精有來其徵有占其靈將應其龍德之馨皇帝曰嘻神保是承赫赫厥聲綏我思成盍敦其申錫之誠乃大其庭乃髙其楹鳥翼矢棘神之攸寧以長我王國之禎重修北嶽露臺記嶽古恆也先王奠祀用秩茲表乃北厯代承承明禋休享罔有降革金衰羣盜蜂起奪掠斬艾所在蕩盡時國朝肇一區宇禮文故事日不遑給故嶽祠為爾寂寂幾十餘年天誘其衷故萬户邸侯為建正殿四方始有瞻拜之所殿南餘二十許步舊有臺以容俳優抵角變幻百戲之獻乃募工起南山白石而崇擴之髙丈弱從仭十有一三分仭之一有竒橫如之經營規度凡五易寒暑計費錢二千餘緡侯沒後十有一年其故人關尹子玉丐余文用識不朽余復曰邸侯河朔名將其英鋭敢悍之氣固已光耀本朝非此可以鋪張萬一且謝不敏玉曰有金南渡河北羣雄如牛毛弱之肉强之食鄉人惴惴焉其心危獨倚公以為重公亦以此自任貞祐初天兵南牧衆推公主石城寨丙子石海亂歲且饑民瀕於沙河者夜採魚藕草糧以糊口晝穴窨不敢出海遣何運副者擁精騎五千駐之曲河村得一窨即食之析骸㸑骨腥聞於天公不勝忿恚募健勇者得數百人與何鏖戰生擒何刳其心以謝衆用是順天都元帥府升公為恆州安撫使其年十一月與武仙騎將葛鐡槍戰有功帥府承制遷公為驃騎衛上將軍元帥右監軍金虎符恆州安撫使如故庚辰正月武仙復陷真定公㑹諸部兵欲謀必取行半道聞中山李成叛即趨恆申警守偹俟釁將動五月武仙遣人將精兵萬五千人屯於黃堯之兩山與真定為犄角之勢且欲逼恆時麥方熟恆人持此以為食武兵日芟夷之公召諸校謂曰今恆邑乏食軍不滿一千與其坐視民死當與此冦一决戰大丈夫成則為侯不則為禽亦何恨也諸校亦踴躍期一戰先是武兵畏公威名不敢近及奄至營中不知所為自相蹂踐比曉溝壑填溢腥血蔽野得畜牧甲仗糧糗不可勝數恆民賴是得活其年十月改知中山府事公剛徑自信不畏强禦甫數月有畏愛之稱又五年改行恆州元帥府事國朝以馬上有天下故元帥為貴階又十有四年詔公以萬户統諸道兵圍宋師於歸德取之遂收略宿州光州及薊酇臨渙等縣以功詔鎮歸德又十有九年卒夀七十三子浹以虎符嗣職今移鎮息州公平素悍勇有大志逢時草昧與羣雄角逐視殺戮攻掠若袵席然而能敬恭神明不靳已財若殿若臺咸出雅志即今瞻望廟貌使人有焄蒿悽愴之心者皆公之所自出也廟多古銘刻非公持護則破裂若井樁者有之矣僕不佞辱公平生知待公今亡矣他日紀太常銘神道當必有任其責者僕特因故舊尚因是臺以道其梗槩用嗣永久吾子幸無讓初曰苾苾芬芬祀事孔明先成民而後致力于神者邸侯有焉人之有技若已有之人之彥聖其心好之不啻如自其口出子玉有焉禮五嶽視三公諸侯非境內不得祭季氏旅泰山仲尼乃進林放以厲冉有世變益降家自作古風俗因緣遂通上下而祭焉當河朔潰裂綱傾維崩人心之存唯有畏神禍邀福幸而已然擴是心以往則猶可以撲虐熖而戢毒螫是以君子尚有取於斯焉書存吕刑春秋紀胥命皆聖人所以待叔季之義也古今肇祀禮軌㑹當舉廢典巡朔方侯甸男衛邦伯咸執幣贄駿奔走以相助柴望或者未必不以是臺為茲嶽告朔之餼云公諱順字從政世為真定行唐人怡然亭記漢中耆艾西軒王先生有亭於新居之西字曰怡然蓋其子無疾無妄為先生偃息徜徉之所築也亭以茅峻以土階户正離牖隨日出納北軒與暑相抗懾故冬燠夏清其下植松植梅竹植冬青棕桂雜樹卉有盆池有石山有小曲徑雖近闤闠翛然閴然大有山林佳處氣象其中貯以六經子史及前賢義理性命之論冠婚喪祭之說異端詭怪縱橫利祿一言不得與也先生本髙平人從父祖避兵徙居嵩山之陽甫志學又從鴈門李公入蜀回駐興元一時達官為其子弟築館請受業因留家焉先生早罹兵難艱險百至既息肩益讀書以究極義理為本根以踐履躬行為實學故郡生賢良咸師表之至元十二年敕授本路教官既受命無幾何時即以老疾辭其年朝廷以陜西提刑移治南鄭時先生與無妄如澤改葬其考妣明年初按部自雍還始得與先生相識先生巍冠博褐進止舒徐其容莊其辭溫藹然程朱家語録中人也用是嘗侍几杖十有五年初至自東川一日與客登茲亭客有顧門楣而問者曰夫所謂怡有怡怡之怡有怡聲之怡有怡然理順之怡此所謂怡何怡也先生未對初應客曰王氏此亭必具此三說然後為義備無疾無妄于于友愛克敬克弟怡怡之義見之矣觀其事先生溫恭是式遊居有常奉所欲以養之柔色以溫之則怡聲之義又可見之矣至於先生自少而壯自壯而艾雖遭罹險艱造次俯仰無所愧怍今以其所見者考之先生薄于世味不以官達功名用心不以子孫田宅用心不以矯飾聲譽用心方寸平和無所干求一順於理如葬藏如祭享如教諸生灑掃應對進退悉有本源制度表裏無一毫滯礙處怡然之怡可不於是槩見之乎世之昆弟以財産相傾奪以言語相忿􅓰至終身有不相悔悟者孟子所謂好貨財私妻子好勇鬭狠不顧父母之養其心如劔㦸如陷穽如豺狼禽犢豈知夫怡聲之聲之義哉如韓子所謂足將進而趦趄口將言而囁嚅觸刑辟之誅戮僥幸於萬一者或茫然若有所失而未得或赧然若有所觸而未安或戚然若神有所未定或枵然若肝膈有所不足夫如是而能造夫怡然之閫域者未之見也此亭之怡蓋兄兄弟弟父父子子分而言之則由一而三合而言之則自三而一者也客曰誠如君言先生笑而作初亦自謂無愧辭相與怡然而出後二年無妄以府掾有能聲辟置之司因徵豫說以為記復告曰先生之怡油然自得於理義涵泳之中日用體踐之實故為識者景仰如此若子昆季之怡既無失德尚日加勉不可少有虧歉以傷先生之怡其歸語汝兄毋忽先生諱得輿字戴之西軒其自號也麟齊記王文慷慨尚氣讀書以左傳為專門之學因名其名齊曰麟蓋取春秋獲麟之意也初謂麟仁獸自黃帝堯舜以降厯夏商而周麟不屢出也夫麟必得天地仁厚雍和之氣以生在黃帝堯舜禹湯文武之前其仁厚雍和之氣比屋皆然雖有麟不以為麟平轍東遷王室實蠢蠢焉齊楚秦晉吳越熾烈之熖始波蕩風靡以橫蔽六合故有為窮竒為檮杌為叨餮為魑魅魍魎為蜂蠆毒為蠱雕為長彘磨牙垂涎食肉于血當是時而麟出焉則其為麟也固宜不然則郎之狩紅之搜孟諸之田必有粲然而鬛者豕猝然而角者鹿夫豺狼麏麋之屬而不一也聖人不書獨拳拳於麟者必知其麟之為麟也與麟之為德也韓子曰麟之所以為麟以德不以形是以麟不出於黃帝堯舜禹湯文武雍和之前而出於齊楚秦晉吳越熾烈之後是知春秋之麟雖不根於仁政薰養之力而其自得天地者則固若也說者又曰麟為明王出也無明王亦出則麟不為當世其為春秋為後世麟也必矣是故學春秋者必麟其心其行然後聖人經世之志與夫天地人事之終始則有以得之矣其出也必有以麟天下其不出則所謂麟者固在也若嚴光之麟於漢諸葛孔明之麟於蜀陶淵明之麟於晉其出處雖不同而為麟則一也王文真積力久其胸中之麟他日必有一出不知天將使麟其所謂當世之麟者乎將麟其所謂後世之麟者乎麟乎麟乎是必有一在也今其張本耳故喜為之記重修寶雞祐德觀記安西王相中奉大夫李公與道人袁志安有一日之雅因請公主修其住持寶雞之祐德觀公報疏云不謂羽衣之師德視為香火之主人又云人無兄弟胡不佽焉良哀其心之獨苦我有田疇永為好也薄助其力之不周用是袁公遣其弟子張志全來謁初曰志安木石野拙學道未成一椽一茅分亦足矣曩因先師以河山形勝卜祐德之廢垣令志安輩披荆棘拾瓦礫歲甍月楹未有成遂承參知政事中奉君不以山野鄙薄過為提挈倚賴屏庇今得三清四聖混元靈官等殿暨雲堂厨庫方丈三門之屬改復舊觀感戴盛意不可不為記述以示永久敢以文請初謂神仙不役於物而名山洞天非神仙不可居宰相不遺於物雖衣褐寬博而宰相在所恤寶雞古名縣也左秦右蜀襟山帶河自姬嬴以降故實可考其為仙人之窟宅蓋無疑然干戈焚蕩之餘榛莽悽愴狐狸所居豺狼所號非天誘其衷假手於賢相君未易及此相君朝廷屏翰王室柱石生民之休戚社稷之安危係焉乃能不屑於是則其心耻一物之不獲其所可知巳茲宜書志安潼川人性冲淡與人欵曲謙謹其師張守衝紫微全陽普度真人周公之所自出也初周公承教丹陽居邠州玉峯徒衆以千數而守衝為髙弟守衝雲襟霞佩翛然有塵外之想住鳯翔之長春凡四十有五年是用秦隴知名朝廷賜號曰崇𤣥無欲大師師知志安可托付以大事因以祐德俾之今興建如此可謂能成其先志者也志全本邑人喜讀書風骨不凡經略雪溪劉公甚愛重之乃托其意作步虛詞七章壞垣野粉零枯香石欄老雨皴秋黃山川良是成荒凉仙人駕鶴來翺翔隴頭耕瓦見羽陽碧雞金馬何茫茫相公經綸無遐忘偶竒竒偶圓而方慨然以是為主張郢斤岷礎呈竒祥銅龍鐡鳯搖輝光神仙官府千洞房山人自分過所當彌羅丹華誰比將一心惟有祈穹蒼相公眉夀天與昌明年平蜀歸朝堂盡措民物如成康渭流西來今湯湯厚福與之孰短長厚福與之孰短長
