body:
  text: 青崖集卷五元魏初撰銘遵誨堂銘并序中統壬戍初卜居開逺里以教讀為業緫管韓君通甫及其弟君美以子姪輩見屬因相與往還嵗時伏臘嘗升堂拜其先人禹城府君而間得侍函丈焉用是知府君為詳府君資性儉素愿而能恭喜讀邵康節詩與人言多賦康節䆳理之語以見意初貞祐戒嚴所在發閭左禹城小而衝縣官閲戸集丁㒺有孑遺韓氏諸昆季莫不憂怖府君曰是我當行即慨然應募編之矢石之下及城䧟殺畧殆盡府君艱闗百險僅能逹燕居未幾乃嘆曰吾父母昆季兵亂中浮瘞原莽今不早藏葬吾死不瞑目矣時道路猶梗塞府君畧不顧慮竟以其父母昆季及旁親之未葬者收附先隴鄉人用是愛重之府君居燕凡五十年與人交懇欵周宻如一日自六十以後即以家事付妻子有無一不論焉日與耆舊數人但逍遥笑詠而已嘗召通甫君美誨曰吾平生無他才能苐與人以誠律已以儉耳今日見汝輩成立以終吾年未必不由此也吾雖不足學汝若不能他日復不如我矣孝謹亷儉天自福之苟僥倖一時雖富貴吾不羡也通甫兄弟奉以周旋不敢失墜一堂之上雍雍熈熈孟氏所謂父母俱存兄弟無故者獨於是家見之及禹城君棄養通甫思所以不忘先君之訓與所以致其終身之慕者恐有所未盡乃以遵誨名其堂葢欲其起居飲食出入謦欬無一毫而不遵是誨也用是士大夫賢之率有詠歌初辱知最舊敢掇拾其實而銘之其辭曰有觱其泉有茁其芽源虛踵涸本固膚華韓氏載美世修其家如泉斯淵如木斯嘉隠耀伊逺慶鍾府君加以恭慎克儉克勤不固而嗇不侈而文藹然一堂葛天氏民茫茫堪輿孰愧孰怍既壽且昌符厥攸作誨言諄諄有子敬若没而不忘亦孔之炤匪堂是銘乃銘其心匪堂是誇乃身是箴霜露風雨感愴欷歆如覿其形如聽其音一語不度厥誨是忽一行不法厥誨是咈魏初銘之用介遐福止齋銘為四川東道宣慰汪公作也銘曰事有萬殊理一而已其一謂何至善而止君侯名齋乃克取此予不能文槩摭厥旨報國以忠事長以弟慈以逮下敬以持已擴而推之實止之理顧其力行果如何耳吳下阿蒙刮目有以萬古一心毋愧於彼至元十七年七夕後一日青崖魏初書於鞏昌副都總帥私第之南軒湖山石銘并序峰巒洞壑之秀人知萃於千萬仞之髙而不知拳石突兀呈露天巧亦自結混茫而軼埃氛者君子不敢以大小論也香林向伯共父得此山而名之名既立則混沌之竅吾不知其凡有幾也今端甫亷君好文雅而喜古澹復珍其石而圖冩之是又伯共父之變風變雅也雖然吾知其有所取焉爾乃作銘曰小山屹然𤣥雲之根峰巒洞壑無斧鑿痕君子懿之置諸几席匪竒是誇以友静徳㧞秀峯通甫韓君植之於遵誨堂之右初竒之為作銘嶷乎其離羣朴乎其有文含太古之孤潔漬秋波之鱗皴雖處乎堂闈之間而氣通乎仰嶺黄堝之雲葢有似乎主人能急流勇退遨逰於士君子之門而風神物表超然無一毫之塵也仰嶺黄堝韓氏别墅在其下神道碑總押七路兵馬邸公神道碑銘至元二十六年十二月懷逺大将軍潁州萬户鎮無為軍邸澤遣其子繼隆以書来京師請銘其先人墓碑初與澤辱葭莩之戚不敢辭乃為論次之邸氏在漢有上郡太守杜北齊有行臺僕射珍中山曲陽人隋有吏部主事懷道諫煬帝幸江都由是觀之邸氏亦代有人第以譜牒散失無所於考今按所具状公之祖諱亨世業農行唐甘泉鄉聖明谷人金正祐間河朔兵起豪强以鄉曲自保者人或賴之亨四子一曰僧其曰節者有子一人諱顯常知中山府事其曰信者有二子長順行曲元帥府事有子浹今鎮吉州次常於行唐亦置元帥府其曰義者即公父也公諱琮字叔玉性剛决勇悍善射能舞槊其從兄常在行唐武仙来攻常在城上公請戰不許竊出隠以射執旗者中之躍以斬首常以兵乗之仙即敗走時年二十有一又與仙戰於黄臺大破之札古入都圍信安公力戰有功辛夘冬與其兄常從天兵取河中壬辰又從塔沁取雙門倚尖二寨癸巳布展圍蔡公與行及還衆推以為行唐長官在縣平獄訟均賦役人頗畏愛甲申真定史侯以能辟充其府推官明年奉御呼圖克奏公有戰功遂錫金符俾總押真定大名河間西京洺磁懷孟濵棣七路兵馬路置千長一人守隋州宋人来侵公與戰屢捷戊戌察罕㧞滁州愛賞公勇徤俾赴闕奏凱過家以疾卒實庚子八月二十八日也年三十有五麾下莫不流涕感惜娶劉氏靈壽大族也後公二十二年卒資性莊麗聰慧閨門修整門下吏嚴憚如公在日子澤嗣職皆其幹畫所自出疾病澤奉藥乃曰天將生我勿藥亦可將死藥復何為其知命了决如此三子長即澤也年十一襲父職乙巳創修亳之鹿邑練士厲兵一境賴以安丙午移鎮潁州戊辰春宋兵夜至城下攻東南面乃令諸軍守三面即自當一面天黒風急矢注如雨死傷甚衆時始三鼓乃令急鼓五鼓宋人聞之果驚城上乃大呼震天地宋人自相蹂踐遁去黎明視城下死者枕藉至元四年從阿珠都元帥渡漢江攻老鴉等寨十一年從丞相巴延戰青山磯獲戰艦俘馘甚衆朝廷以功賜白金三百兩十二年春改授武徳將軍就帶已降金符管軍總管其年秋攻潭州争前登流矢中左臂又中左股神色不變城陷論功加授顯武将軍十三年冬攻静江如攻潭為飛砲所中腦血湧仆數日方蘇用是改授虎符加懷逺大将軍管軍萬户郴州路總管府達嚕噶齊二十三年受廬州蒙古漢軍萬户就帶虎符散官如故居無何改授今職次曰浩曰湜皆騎射喜讀春秋左氏傳嘗受學於吳公起孫男五人澤之子三繼隆聫序最長繼善繼能亦知學浩之子繼祖湜之子繼業公上世農家鄉里稱善人遭時草昧昆季能自樹㧞以愛䕶鄉曲為國家効死力立戰功垂不朽是可書已銘曰邸族本宗寔孔之肖世再業農将大有耀至總押公與時際㑹以戰則勇以牧則恵命不迨心而遽淪逝兹不必哀理亦可詰如木既茂有鬱必發如泉既通有湮必突六載混一罔企今日厥𦙍懷逺必賞以績知公不亡發此雋偉刻銘神表子孫有煒故總管王公神道碑銘蔡國武康張公自滿城移治于保時河朔未平群雄蜂起蔡用兵以竒以正有闇與右合者威稜所至人莫敢當然亦喜收養士類癸巳河南平如前狀元王鶚監察御史樂䕫進士敬鉉皆在其門下舘客則陵川郝經掌經書記則公也又嘗遣公赴北奏陳軍機公于御幄指陳開示敵已在于目中上為聳動因問曰此若語巴圖語耶對曰意則巴圖語則臣也上以材以實益竒之用是蔡之軍旅之機屯戍之策公悉叅謀議士論亦以逺大期公諱汝明字宜之姓王氏本燕人身長七尺美鬚髯眉目開朗議論亹亹凛然戰國魁傑士也祖某嘗貸聖安寺錢千緡遇赦卒還之父好問明經三赴殿選試補御史臺掾有能名公少頴悟昆季五人皆克家厚于貲公獨以逺業自期讀書恥無用之學母趙氏分家貲資以白金百鎰付公公曰兒不肖能自給願以此奉甘旨及諸昆季甲午從蔡南征蔡以兵千人俾公屯襄之皇王度而田焉所以省餽餉遏南冦也兵苦于田欲鳩衆以足廩額公不可仍督墾闢頗忤衆意且忘其有功遂使酒揚言幾于罵詈公若不聞者卒大開田畆是歳大熟囷儲野積人不乏食公能忍以濟事此又不可及者庚子秋蔡與尼瑪哈征滁宋人清野我軍大饑是時公具舟于汝乃泝以入淮漕米千斛三軍之士有勇氣而無菜色公之力也甲辰蔡戍杞治三岔公在幕府以曲陽一軍失治俾公攝之庚戍奏授金符真領千夫長癸巳移戍亳以舊軍不及萬奏以新軍足之仍以公之子儼代治曲陽軍以公為新軍總管至元乙丑從阿珠丞相攻荆南及諸山寨有功阿珠召與語公厯陳山川要害出入之形勢與夫救民湯火之急混一之機甚切阿术為奏錫金鞍一異緞一比至公已卒矣公之卒在戊辰二月十有八日也享年六十娶克石烈氏順淑有容中表愛敬後公二十年卒男八人長曰儼先襲曲陽千長公没後復襲順天新軍總管某年改襄樊舊軍總管又某年山東經畧副使又某年佩金虎符岳州管軍萬户昭勇大将軍岳州路達嚕噶齊魁梧幹敏有局量讀書五行俱下挽强近六鈞遇虎輙斃之惜其年壽不永某年月日卒于岳州之公署時年四十有三次曰侃襲儼千戸攻襄樊有功改管軍總管又改淮西宣慰副使某年佩金符嘉議大夫沿海左都副元帥今除寧國路萬户鎮髙郵詩筆清峻有時名次曰傑以質子扈從一十九年特授奉訓大夫亳州知州兼管内諸軍鄂囉次曰某次曰某次曰荆山早卒次曰某次曰似皆讀書有立志稱其家兒也女六人長適千户宋山甫次適萬户邸澤次適初次適總管孚某次適史某丞相開府公之孫也孫男五人長曰某就元降虎符襲其父昭勇之職今鎮郴州餘尚幼女孫六人二十八年初奉命行臺江南過髙郵侃謂初言先人于吾子最知愛先人没二十有五年墓碑未有銘於義吾子亦當為先人大書特書也初聞之聳然曰竊念壬辰北渡後諸侯各有分邑開府忠武史公之于真定魯國武恵嚴公之于東平蔡國武康張公之于保定地方二三千里勝兵合數萬如異時齊晉燕趙吳楚之國競收納賢俊以繫民望以為雄誇迨中統建元罷矦置守諸賢萃於朝及分布内外迄今餘十年其生存零落功名事業因大小之不齊考其有子有孫終始以享榮位如公家者葢不一二數也初未壯時曽接公謦欬觀其沉毅雅重不見崖岸如萬頃陂運籌幙府料敵制勝如右宿将酒酣歌謡慷慨則如幽并豪傑至于治家教子種種有法以今觀之如公豈易得哉初不佞辱公東床之選今有是命何敢以不才辭謹作銘曰公資沉黙憎囂贏百冗一過無留形讀書恥作章句生胸中隠然十萬兵武康開國收時英入幕得公如鯢鯨上前敷奏誰使令一語韜賞開皇明屯田有策人苦耕不墮不校成豊登譙之乆廢将復城狐狸呌嘯䲭梟鳴旂勍伏夜來衝騰籌畫一倚公支撑謂公不遂荆南行相國奏白公能名謂公胡遽天奪齡不及拜覩江南平九泉之下公有靈兩兒虎節摇光晶墓頭有石石有銘可以考之垂日星故水軍千戸郝公神道碑銘公諱徳昌姓郝氏其先太原人後遷新安之淶城因占籍焉父亮自行伍間從蔡國武康張公取河南以功升千户領水軍屯杞乙巳以疾卒三子俱幼公其季也公之叔興襲職公從母氏歸鄉里母棄家入道公往依季叔溫及長婿於張材趙氏器識已不凡甲寅興屯亳庚申自鄂還卒興子幼蔡以公竒男可用中統二年奏授銀符嗣厥職時其母邢氏在中山尚無恙也公輦歸亳朝夕奉侍人以孝稱其年十二月蔡國公之子萬戸宏畧帥亳師攻宋公前鋒得捷宏畧解衣衣公三年李璮以益都叛宋人乗間取蘄公從宏畧擊走之至元元年與宋人戰於龍岡又捷五年夏五月萬户賈文備奉旨選将校知水戰者俾營漢江教閲以兵五百七十人給公𨽻信安巴圖張喜麾下公於風濤洶湧之間舟楫艘艦凡所動用無不具開合進退緩急響應鉦鼓旗幟號令一新喜用是益竒之九月進攻襄樊明年秋七月公以舟師斷宋糧道與宋人戰於宜城南之灰洲宋人莫敢進又明年灌子灘饑虎崖之戰皆大捷八年四月母邢氏卒公奔喪于亳既襄事始還軍時漢江暴漲宋以舟師數萬沿百丈山遡流而上以援襄樊阿珠都元帥遣公審視形勢公悉具水道淺深可速一戰帥府即發諸道兵公領戰艘十二先入大軍乗之宋人敗走用是奉授金符九年攻樊城十年攻襄陽且益所𨽻水兵至七百人仍以楮幣給之厥後黄家原之役沙洋城之役新城之役咸有功其年十二月十四日沙武口渡江公方督戰為流矢所中以卒時年三十有四諸将莫不嗟惜一子嵩十三年江南平朝廷以公沒于王事就元降金符俾嵩襲其職散官忠勇校尉鎮江隂二十三年征交趾二十五年三翼水軍俱沒獨嵩一軍得還遷中千户今鎮通州一日來廣陵具公行實之狀請曰先人早世至元十二年以先妣趙氏合葬于淶城先塋之次後十年繼母王氏卒亦已合祔矣先人剛勇有志于功名為國家効死力前後數十戰未嘗敗北不幸竟沒于陣有此不書無以垂後世墓碑當有文嵩不肖辱公甥行也敢再拜以為請初以嵩年少能自樹立且孝謹可尚乃按所具狀為序而銘之銘曰河朔諸豪推興王武康開府收英良公之先世班戎行從攻河南掃稊糠兄亡弟繼繼復亡諸孤牙牙孰否臧蔡公識公能持将以竒用竒斯所長天開混一機已張營江教閲排風檣宜城之南百丈傍以少擊衆莫敢當朝廷賞功金符黄公益有志匡時昌沙武督戰如鷹揚流矢一中乖所望天假之年逢平康寧免虎節摇輝煌公乎公乎無嗟傷子克嶷兮文且强千秋萬祀來淶鄉有碑玉立千丈光故征行都元帥五路萬户梁公神道碑銘梁嬴姓非子之後秦仲有功於周平王封其少子唐於夏陽梁山是為梁伯其子孫以國為氏如梁益耳梁嬰父皆為晉大夫汾晉地平遥其屬縣也公之先家於平遥者其世葢乆然自公始大著祖諱顔父諱秉彜好施與鄉人以長者稱之娶郝氏生七子公其第三子也公諱瑛少有大志勇力絶人善騎射金季中原受兵所在郡邑望風奔潰戊寅聖元太師國王領兵南下公曰天也死填溝壑何益乃率衆詣軍門上謁即授元帥左監軍使撫定居民攻諸城堡之未下者公屢出竒計招誘降附凡百餘所明年從國王掠霍踣沁潞經太行大膊懷孟又明年入闗秦隴悉定用是錫虎符升征行都元帥以縣行汾州事俾公領之兵火之餘户口蕩析公安集有法人始有息肩者戊子四月武仙陷平陽太原州介於其間卒莫敢犯國王檄公進兵仙大敗即棄城走己丑入覲特授金符御前千户明年扈從南征至鳳翔俾西和興元等十數城俱下壬辰天兵次唐鄧公率前鋒與金兵戰於鈞之三峯山大破之河南震恐時降附軍民日衆他将以糧絶不給欲盡殺之公曰殺降不祥凡𨽻麾下者悉不得死其父子兄弟離析而復合俾籍於民幾三千餘人乙未從元帥達海甘布入蜀宋人守瞿塘衆不克進公作皮渾脱以濟達竒之奏權征行萬户留鎮興元戊戌又從達公圍資州踰月始下達怒欲悉坑之公曰今始得一城而坑之他城未易下也達善其説公喜曰吾起身鞍馬間不啻百數十戰未嘗敗北所全活者亦不下數萬計壬寅宋人陷成都公與先鋒圖薩擒其四川制置陳某成都平丁未公年五十有七告老不允詔公充西京平陽太原京兆延安五路萬戸詔太原以子翼襲行軍千戸公以太原甫定民多離散懇聞于朝給復三年於是四方來歸者三萬餘戸刑簡令信境内以寧丙辰三月二十四日卒於居第之正寢享年六十有六越五月𦵏于本邑麓臺里先塋之次禮也夫人溫氏翟氏楊氏劉氏子男四人曰羽太原路管軍千戸曰天翔朝列大夫雲南諸路行御史臺侍御史曰某早卒長即翼也今遷成都轉運使女四人平遥李思齊忻州長官塔齊爾京兆路兵馬總管馬祐太原路鎮撫都弹壓李燦其壻也孫男一十人偉宣武将軍行軍總管儀偁傑秦王府侍衛俌太原路管軍千户時佐時中時正時仁時義俱有立志女十人七適大族三在室曽孫男一十四人長思賢次思敬行軍副萬户餘幼女一十五人天翔與初有一日之雅謂墓碑未刻請丈其實乃按所具狀序而銘之銘曰天地草昧間氣鍾豪傑乗機騰其中漢唐之初如囊鋒聖元乃有平遥公公之譜系嬴本宗世稱善人服於農風之從虎雲從龍千載一時公實逢萬夫肝膽誰争雄批秦抉晉天為紅望之而畏羆與熊其心休休如有容救降釋俘扶疲癃并氓至今猶呼翁天之報施亦已豐若子若孫咸登庸麓臺之原汾之東龜螭有文圍有松千秋萬祀何終窮誌銘故鎮國将軍太原李公墓誌銘公諱元佐字祐之太原人粹於律學有刪注刑統賦刑名歌括傳於世金之省部臺院試補掾者咸出其門在汴梁與元遺山游稱祐之余鄉曲為人寛博疏通精於吏事為名輩所推重如此譜牒散失其上世不可考娶馬氏錦州大族也一子婁格早卒二女長適大理評事遥授許州同知祥符劉仲澤徳潤二甥曰好禮正議大夫户部尚書曰好謙四州同知次適進士順聖魏思亷庭秀一甥曰初江西湖東道提刑按察使改授少中大夫侍御史癸巳北渡公偕評事留金臺明年公與夫人相繼逝去評事公權厝之清苑縣竹宅里後五十七年好謙将卜葬其父與兄於完州之富樂鄉朝陽村乃舉公與夫人之柩葬於劉氏新塋之東初適赴召來燕與好謙㑹不覺泣下謂好謙曰不肖奔走衰病不能成此宅相徒以丘山零落感發悲嘆而已今吾弟克辦此初宜銘銘曰嗚呼鎮國初不知其天之所以善者之祀或絶而惡者之蔓更為之昌熾抑其偶然邪蒼蒼者或於是而無意耶嗚呼鎮國有子而早世有甥而即同秩秩幽宫公於其中翛然而來翛然而往與造物者將無窮又何必以芻狗之土苴為汚隆有元故京兆醫學教授趙公墓誌銘至元十四年九月二十有八日京兆醫學教授趙公以疾卒其年十一月十一日葬于咸寧縣之洪固鄉又四年其子讓與果持鈞臺韓澤之狀王府典書孟文昌之請初誌諸墓初謂讀書向道不失世守且見稱于當代生獲榮享死得安厝其亦可書已公諱友字鵬舉三世業醫為人愷悌簡質不立厓岸幼事科舉有聲塲屋間壬辰崔立以汴降公為軍士所掠天成萬户紀侯知其為書生且善醫遂加禮敬與之北歸舘于其家戊戌朝廷設科取士公中賦義論三科優選戊申西來長安凡人之病傷於寒不能汗下目瞪上視面黧肌班狂走呌呼陽極似隂隂極似陽或隂陽交雜衆莫之辨公投劑立效用是知名闗中至元丙子皇子開府于秦擢公教授京兆醫學公益讀書設科條開諭後進竭情濟物弗嗇賤貧及疾且病召諸子戒曰吾即不諱勿浼我以俗葬祭惟禮制為歸仍以譜系付之翼日卒於正寢享年七十有一始公之六代祖楚世為澤州人楚生卞卞生凖凖生信信三子長諱順公之祖也以大定二十年徙居河南之登封順亦三子長諱元公之考也妣魏氏皆葬登封公娶曲河李氏子男四人曰讓通經傳尢長於春秋以辯洽聞復領教職曰育有幹蠱之稱曰業早卒曰果愿而文能世其業今辟侍秦邸女三人適望族孫男一十人女三人曽孫女一人銘曰士氣益降處益薄忮售争誇靡攸怍百年耆艾嗟零星後生且老孰與作如吾趙公豈易得為學為醫俱有得少時習氣老不衰日教諸孫課文筆病傷於寒世所難况在疑似隂陽間公能審定濟勇决昨日危岌今平安鼓鐘於宫聲四馳薦譽交口王為知顓門之學罕所見俾集生徒傳心幾始終條理方有説一病不起夫何為天之報施亦已厚若子若孫能孝思咸寧之原洪之鄉有趺在龜文在螭千秋萬古過者式是為國醫趙公碑蒲隂霍君墓碣銘至元十四年朝廷以監察御史霍君按覈川陜初適分司東川與御史遇於褒城遂自漢沔利閬抵順慶相從幾一千三百餘里用是得欵接言論始御史自東曹掾辟補樞府自樞又辟省在京師凡十有一年交從中以有風度有持守見稱苐以冗奪未暇欵宻也以今觀之向所得於交從者為益信明年二月御史将東歸乃謂初言先人有志量喜功名甫四十即退居鄉里以經史課諸子百未一施賫志九泉葢有望於天祥輩也天祥自筮仕以來戰戰兢兢不敢有一毫自肆每感念先人之志意恨無以詔後世者敢以銘請初不敢以不才辭謹按所具狀為論次之霍氏其先出於周如光如去病未嘗乏其人惟隠徳不仕者則無譜牒可考公諱安字安之其上世居蒲城之荆山金㤗和間因避兵於祁祁帥賈侯愛公倜儻直諒公亦喜侯之知己遂占籍焉嘗佐賈侯攻定城邑以功俾督税課凡増羡一錢不沒已悉輸官侯以是益賢之欲更擢用公懇辭買田於祁不復以世務縈其心有詰其故者曰以公才器志量取青紫如拾地芥為爾退處且耕且織何自苦如此公曰吾平生喜功名遭時多艱志願不遂今老且諸子齒長矣不與之教挈恐未有以起吾宗者聞者稱之如是十餘年以疾卒享年五十有七葬于蒲隂之白家庄娶李氏勤淑有法能奉承公意督率諸子甚嚴今八十神明不衰如平時子男二人長曰天澤次即御史也女五人孫男三人女四人先是公從賈侯破汴獲生口且衆北度後悉縱為民公卒之日有號哭自逺而至者詢之汴俘也公賦性果毅踈財尚氣吏事其最長者今其子立朝卓卓為才御史天之報施槩可見矣乃作銘曰肅肅羽翰既奮復戰公之有志貽厥孫子鐡冠其昂門閭景光公不為亡先君墓碣銘先君諱思亷字廷秀生於明昌元年之八月五日壽六十卒於真定無極縣之寓舍實己酉正月三日也後二年𦵏扵房山羊頭原桑亁丘壠固在房山之塋已三世矣敢敬附焉先君業進士文賦有聲性愷悌與物無競而嚴於家範嘗撰先世遺徳曰家塾記其後序曰自吾髙祖朝列為一原曽父酒使季曽參政𣲖而兩之或以文章而升或以門地而進舍此之外不由他道不苟求不奔競未嘗有悖理傷道之過者以政事觀之不須觀循吏以耿介觀之不須觀獨行以忠義觀之不須觀顔氏之弟兄以讜正觀之不須觀陸贄之諌論以文章學問觀之不須觀儒林以母氏之賢淑觀之不須觀列女子孫能講誦以味之不猶愈于慕他人乎用是自天㑹歴大定明昌真祐正大迄于中統至元之間雖支派分布而繼繼承承知有本統者葢於是記有考焉耳先君之曽大父諱子貞用弟叅知政事諱子平之䕃終於兠答酒館使以長子景元贈定逺大將軍始考妣既喪主管家事佩無變世守之訓循循侃侃鄉里稱焉曾大母不記其氏大叅其叔也奉承如賔大父諱允元改徳元定逺之仲子也承叔父大叅䕃仕至甄官署令嘗謂諸子曰我家貲可約五萬餘貫渾有幾不若供汝輩讀書㤗則登第不登第猶足以學自守於是館請髙公瑞卿王公冲之嵗不下干餘貫又與游皆當世名公鉅卿也壬辰北渡後襄隂人王革以書抵我靖肅君曰令先丈任上林署丞時或三日五日㑹黨世傑趙文孺魏摶霄張仲淹楊敏行諸公禮極豐腆徹膳令諸昆季讀賦教子嚴重傾動京邑大母同邑平地人西京轉運同知髙公之女也賦性沉厚内外無貴賤莫不敬愛先是署令君以事抵燕夜過黄嶺聞異香二十餘里未幾大母歸於我壽八十六封鉅鹿郡君父諱珪改諱笏字君玉署令府君有子凡七人曰珫業進士弱冠承父䕃終於耀州庫使散官懷逺大將軍曰瑜業進士早卒曰琦進士登第戸部郎中行六部侍郎散官太中大夫死於河南郟城之難曰玠神童及第終於延安府司獄散官朝列大夫曰璠登進士第出繼大叅之子法物庫大使諱叔元之後正大八年京師戒嚴擢授翰林修撰召恒山公武仙入援及歸徳城陷北還鄉里名聞天朝庚戍被徴是嵗卒享年七十皇贈諡曰靖肅曰玊業進士舉篤志力學府㑹試屢得上捷因避地唐州比陽縣與友人苑徳茂者入山不知所終先君之父其最長也虞夏文不勝質終塲時年十有八後補入太學聲聞藉甚為流輩所稱春秋私試三作監魁與張巨濟馬至道馬柔克並驅争先無得而優劣之不幸七赴殿選終於貞祐三年恩賜而已用是絶仕進意養心守道澹乎其世味也右丞尹公仲安尚書曹公仲寛大司農張公維賢欲薦於朝不應母髙氏運使曼卿姪女也聰慧妙巧年二十二以卒先君娶李氏太原公祐之之仲女也文雅和厚巧慧孝謹中表咸稱之太原公粹於律學元遺山書其刪注刑統賦有云祐之予鄉曲在汴梁與之游從為人寛博䟽通精於吏事其為名輩所推重如此再娶班氏本豐州人其父任至許州録事有能名三子長曰鑑命繼靖肅公祀今名初江西湖廣道提刑按察使李出也仲曰鈞湖廣行省令史性剛直能自刻苦不肯俯仰於人季曰鉉早卒二女長適孫氏亦早卒次適延氏早寡不以貧窘累其節皆班出也孫四人嫡曰必復翰林國史院編修官庶曰可大可乆可亨女孫二人曰文曰都曾孫女二人百壽秦娥初伏讀先君之記有曰我魏氏自季曾輔政以來享禄位者有之不能盡其實者有之不知天意将如是而已乎將有以待於後人乎於是於先大父於先君益有所感泣焉先大父文章禮法施為注措足以建世業於當代朝廷限以科舉資考使恢竒磊落之士鬱而不信其治亂葢兆於兹矣先君方刷羽天池而圖南溟世故已變且壽不能逮時可哀已嗚呼壬辰之變世族大家其子孫不零落者有幾間得存者復有杞宋不足徴之歎初輩雖不能肖似藉賴先世遺澤知自守而已嵗時伏臘過家上冢鄉人喜松楸之無恙則知天意良有在也謹再拜銘曰紀先世之徳業用照後人雖不偶於時其澤孔殷子孫念之尚毋變吾先君世守之文故四路屯田達嚕噶齊王公墓銘至元二十一年初自河東提刑副使承命赴臺將戒車醫藥教授吕某賫府教官王𢎞嗣狀為太原治中王居敬請銘其先人墓初謂余來太原未再期月又按部别郡三之二於居敬未審其行業遽叵撰述某曰今風俗中處富貴者例以聲色狗馬為意其懇於光揚先烈者有幾君自下車雖以擊姦慝為職苟於孝思有良心發見者抑豈不可勸奨之乎不然是絶人於善使無由以自㧞於流俗也度不可辭乃考所具狀公諱䝉固岱秀巖人少習軍旅事烈祖皇帝以戰功授西京太原真安延安四路屯田達嚕噶齊辛夘治忻州課農有法明年大饑公言於上咸逋租以所屯糧給民無私焉時簡車徒頗憂公抗論得止又請於朝發倉粟以賑饑荒聖天子即位詔領屯如故至元五年告老十三年正月二十八日以疾卒享年七十有七𦵏於定襄王村之西北娶程氏子男三人長天澤以謹愿稱仲天祐先公一年卒季居敬嘗侍春官以勞遷今職七女八孫祖忘其諱金鎮國将軍始居東京父益魯襲封千夫長母青氏銘曰於惟王公此為幽蔵永千萬年考兹銘章張處士墓銘處士諱謙字無咎順州溫陽人居燕凡三十年我先大父靖肅君嘗被命於朝薦中州名士六十七人謂無咎言行孝謹可正風俗用是當路者欲辟之從事無咎辭不就讀書學道以教授為生業於世味澹如也未幾其母卒居無幾何其三子繼卒又無幾何無咎亦卒獨其妻裴氏在焉有兩女孫並幼貧不能葬總管趙彦澤買棺以埋之友人王惇甫請余銘諸墓銘曰俗紛紛兮莫治心澹澹兮自怡讀書兮守道毫髪兮無違豈昌衍兮敢冀天曷為兮不憗遺風蕭蕭兮樹蓊山空空兮鳥歸懷佳人兮不可見望蒼旻兮涕洟行狀易州太守盧君行狀曾祖諱均祖諱永昌皆隱德之不仕父諱應皇任易州太守公諱德元世為易之淶陽人性仁厚既長以幹局聞金真祐間先太守以公受易州軍事判官時河朔諸豪並起各以力相雄長生民糜滅幾盡先太守以天造草昧禍亂未艾乃率士民歸之故蔡國張公用是表為州之太守歳乙未以老請朝廷以公嗣其職公蒞政即有能名初般州寨張坦率衆來冦公以百卒破之指揮坐作大為蔡國公所歎賞是時流民未盡安業率棄土著以避租賦知公治不迫四逺而至者甚衆朝廷立教條方切凡經食之所悉欲以死處之公曰民愚犯禁固不可不治然一槩用刑恐非國家愛養斯民之意乃力辯於上官卒從公議州民至今道之猶有以手加額而泣者州之開元寺僧以事觸蔡國公蔡附公耳語公出曰坑若軰不難第罪有重輕耳我辭必獲罪咄咄者久之乃曰吾得之矣甘泉名僧也張侯素重信我白必得所以解意乃徃白曰州僧得罪張公我當縳致以請罪比至上人幸寛解之數日以諸僧至張怒已解悉得放免公在州凡九年懇乞致政又十有七年以疾卒享年五十有六夫人趙氏子男二人長曰琪嘗被省檄嗣厥職未幾有詔赴闕下次曰珪今潞州同知女一人適李氏嗚呼公之慈祥瑞愛謨謀有方詩所謂愷悌君子民之父母者有焉觀其肅恭父職孝也以寡敵衆勇也拊循制理公也委曲排難仁也一有於此猶當大書特書况其四德兼備者乎是宜敷贊遺烈章示來裔必有當代名公能文者盍請銘焉謹狀引申氏父子慶㑹詩引今東曹掾申繼賢以事至長安持其先塋之碑以示余葢今儀同三司致仕張公孝純之所撰也且曰繼賢上世家澤州多讀書顯仕者繼賢晚生譜牒散亡不能具述大人自壬辰兵變與祖父母暨伯父相失大人搜訪百至竟不知所在日夜號哭一日有道人崔其姓者亦澤州人與大人語大人因以祖父母及伯父年甲字貫付之後數年道人與伯父之子天錫偕至大人即趨其所在遂得父子如初此亦間代竒事願乞公數語為序引以求諸名公之詩將為子孫傳不識可乎余謂向分司東川與順慶教官史子桓者相遇子桓有元遺山李敬齋中州諸人之詩一巨軸皆贈遺子桓尋親之什也子桓亦以壬辰之變與其父睽隔北渡後子桓周流數萬里厯六十七城自始迄今近五十年卒無所得子桓悲悼未嘗一日忘也余因以詩贈之云泣血尋親白髪兒牛腰半是昔人詩傷心四十年前夢一片白雲無了時子桓泣數行下因謂余言僕年埀七十此事不辦雖死地下亦不瞑目矣今子賢尊君與子王父母隔絶日久一旦㑹遇非精誠感通與先世隂徳積累之故何以臻此以君家與子桓校之其得其失其幸其不幸葢相去萬萬也子能求諸賢詠歌以布永久宜也遂援翰書繼賢所致之辭以為之引諸君其有以思之也至元十八年五月二十有三日魏初引庸齋先生哀挽詩引庸齋楊先生薊州玉田人嘗避地河南北渡後居燕以教授為業樂於提誨循循有法性仁厚愷悌恥言人之過失有小善必極日稱道不啻如其自己出客有窮窘無所依先生與之周旋百至或館於其家至更易寒暑無一毫倦怠意用是賔客日滿門有布衣孟嘗君之號一時名公巨卿如陳學士秀玉梁都運斗南先祖靖肅君玉峯皆折官位軰行與之交故海内識與不識悉能道先生之姓字先生嘗奉命提舉河間常平事後改衛輝勸農未幾辭去朝廷復授興文署丞先生有志量有幹局課童子學三十年後雖被擢用又復閒冷不得盡所施為士論惜之而先生澹如也有詩千餘篇一子遇今在史館近以書貽初云闗東諸公於先人率有哀挽陜西大夫士非吾子孰任其責初為之䀌然初十有五從先生學知先生莫初詳也先生今亡有年矣其子以是請可哀也已元遺山作孟内翰宗獻傳并記劉元黨孔嗣訓高特夫諸人哀挽數詩以謂有以見先生於出處之際死生之變造物者皆使之前知其以天下重名畀之者為不偶然云是知前軰一言一字為人物之重輕如此今陜西耆舊中商左山㕘政李先生諮議皆素知先生之為人誠得摛辭以發揮先生之幽光則先生之德業有以詔後世而慰九泉者葢無疑是豈獨孟内翰之名為不偶然云先生諱時照字春卿庸齋其自號也至元十有五年正月九日門生魏初引贊曾祖母真贊惟曾祖母高氏系出子孫禄養壽八十六黄嶺之香亦孔之燭祖母夫人真贊并序惟吾祖母渾源南山劉公之曾沂水主簿之子内翰蓬門先生之妹神川遯士監察御史之姑氏也賦性貞順勤儉孝謹其事我祖靖肅如對大賔客歳時伏臘供奉祭享菜菓醯醬必躬自修薦誠潔懇到至老無一毫怠意經史文賦一目成誦且能通其大義而停蓄涵藴若無所知者是豈世之淺薄粗識姓字而矜以示人者可同日而語哉至於奴僕米鹽恒煦濡温飽然亦未嘗不謹扃鑰而聽其自出入也族中少相違言處之以當然之義不以彼此而有傾向也年七十以家事付初怡心引年以書以琴而已至元十二年初自監察御史蒙恩遷僉陜西提刑司事祖母時年九十有一初不孝不能謝事以終奉祖母年壽乃妄自謂吾族自兵亂以來零落如此欲少自振起又謂既仕矣不敢以一介之㣲輙方國命遂以温凊之責付男必復流涕西行其年十一月至漢中明年六月二十一日祖母以疾卒八月訃音自京都來即號哭奔赴必復已奉柩合祔於祖父靖肅君之兆矣嗚呼初之淺識可謂篤於近利而不能勇於大義者也其得罪天地百死不償毎展拜遺像肝膈崩裂雖痛恨無窮尚何言哉贊曰肅而寛大禮而有節百世而下惟永之則祖父殿試真贊大父殿選凡七赴之三魁太學不偶於時恬澹守道無營無思祖母真贊大母高氏嚴嚴壼儀不幸早世棄諸孤如遺噫再世其構此云胡不悲高祖父定逺真贊高祖定逺友愛于于教弟力學起宗以儒百世而下遺澤孔濡高祖母真贊惟高祖母記失其氏世業之修興宗之始内助實多子孫仰止曾祖父署令真贊惟曾大父令甄官署教子義方聲聞四著有來其孫毋墜厥緒西軒王先生真贊并序西軒王先生濩澤人性安靜以道義自守以孝弟忠信教諸子居漢中三十年郡人咸師表之其子無疾以冩真來見為作贊云世百偽以爭利公囿義以守也世丐售以衒名公自晦以厚也我薄彼贏若固有也義理以誨諸生自天牖也温温儀刑望程朱其尚友也説道則猶鈴冀有覺於百世之後也平章亷公真贊并序諸葛孔明開誠心布公道有其氣也鄧禹入闗撫慰安集有其量也能兼氣量夷險一心以天下為已任者故榮祿大夫平章政事亷公有焉至元丁亥公之子恂按察江西初實與同事其年十一月十有九日得拜公遺像平昔既辱公知䀌然悲思有不能自已者謹作贊曰造物厚與公之資將俾有為今昌時氣充以大量亦大始終一節無險夷憶公持節西入闗大憝無所容其姦霹靂一發肝膽墮秦城百二維秦山明年柱石中書堂堯舜吾民餘粃糠姦諛媒孽不一再安之若命惟元臧天開混一江南平俾公卧䕶江陵城江陵塗炭亦已久得公安集如再生公之孤忠何終窮公游汗漫騎長風公乎公乎見遺像幾何斯年有如公幾何斯年有如公西溪王公真贊并序初弱冠時識西溪王公於楊子陽之賔館公時年未三十聞望四達士大夫咸以逺大期之未幾與陵川郝君伯常同奉召逮主上龍飛即被擢用由禮部侍郎遷都轉運者二遷提刑按察使者四如尚書如總管如今中執法前後幾三十年矣無曠闕無怨讟愷悌樂易人莫不以寛厚長者許之彼喜功好事以表表自勝者豈可同日而語哉乃作贊曰如玉之潤如春之薫自得之天也有神者筆有竒者文用力之専也商功利課殿最新進所喜為也惇薄俗正士氣非若孰與歸也同知趙公真贊為政有惠讀書有方交從四海曰徐與王徐復齊王鹿菴子能世業門閭輝光公為不亡師易馬丈真贊師易古學惟㣲惟精盈虚消息與時偕行處通以義處塞以亨行年七十而神而明幅巾翛然鶴癯松貞若子若孫惟永之慶王隱君真贊君名守義字惇甫不以紛華累其心不以貧窘易其守循循侃侃無一毫傷人之疵而能致力以藥已之疚不以文字侈其言不以詭異險其迹温温恭恭無一毫作為之私而有日用踐履之實若夫梁先生都運之剛明吳先生學士之簡古木庵英上人之清修我先大父靖肅君之慎所與皆折官位軰行為之延譽於公卿之間亦足以見吾隱君王公之所處也燕居傳道圖贊聖學心傳不言之天申申夭夭其彷彿於斯焉庸齋薛先生畫贊謝紛華之擾而逍遥乎山林泉石之間擴中庸之理而超越乎雕蟲篆刻之上才猷可以濟世而不以不見為悶文章可以名家而直以自得為諒有天地中和之清氣有湖海沉雄之雅量人知其品之不凡莫識丹青之巨狀然觀其敦龎䎛艾之姿與其立言可考者論之猶足以激士氣敦薄俗是豈趙孟之所貴而遽有所趨向者耶疏木庵塔疏方外若人固豈求名之是篤生前知己忍能見義而不為嵗月雖遥情文猶在木庵上人百年耆舊一代宗師有承平愷悌之遺風無蔬筍葛籐之習氣接迹於趙禮部李屏山之後定交於雷御史元遺山之間字如東晉而不凡詩似晚唐而能雅秋風杖錫遂駕鶴而不歸白草岡原尚勒銘而未了叢林四海生死一心不獨昌黎已摛文於李觀㑹如郭伉能買石於施卿説尚野名説東萊吕伯恭甫謂韓子簡古一本於經亦學孟子又謂栁出國語學者知韓栁不可到非鑿空得出亦自有原委近世党竹溪謂王黄華趙黄山少讀六經餘人當何如保下尚生喜學詩文又欲進學古人余懼其愛春英之華而忘秋實之鮮也因請名乃蔚文其字野其名求為説余曰是其説祭文代楊德榮祭濟瀆文德榮自惟菲薄凡所任荷或出彼入此不無愆譴然所以得康靖寧謐無大驚懼者非神降休貺曷克臻至所當薫沐蠲潔奔先致敬親執祀事於廟廷之下今以羈役所奪愧責尤深而區區之誠千里一心薄奠徃敷神其降監祭王五宣撫文惟公事親有道馭民有方撫弱有惠禦强有剛初佩虎節再要郡章及物之澤浩然莫量此先相公之德所以愈久而愈光嗚呼哀哉以先相公之徳望繼之以我公之所長宜其祿不止百世而厚業不止百世而昌人期公位必為望郎人期公年必保壽康理不可恃倐然隕傷郡失賢守宗亡善良識與不識莫不涕滂况在親舊悲何可忘矢辭寓哭侑此一觴神寧知之裂我肺腸嗚呼哀哉尚饗雜著書濟河焚舟賦後焚舟賦辭意憤激葢急於求薦者也宰相以薦賢為職苟有賢者使之零落憤激如此則宰相之過也賢者苟未遇不能安於義命遽憤激如此亦賢者之過也中丞西溪公為卜掾彦才書之彦才能珍其書而什襲之不知能於進退用舍之間曾用力審察否故敢此相告跋宋漢臣諸賢尺牘手軸京兆漕使漢臣集耆舊所寄尺牘一軸以為珍玩物謂遺山紫陽一代宗盟王内翰楊大㕘有名節天朝今仰以羽翼斯世者至於九山諸人雖逺迹林壑亦一時名士宋卿皆與之游則所得宜不淺文章字畫隨人品高下宋卿當自知之此不敢論書夫子廟碑後聖人所以與天地參為萬世法非有甚竒怪恍惚以驚動耳目者之所為也亦曰率性修道而已如菽粟布帛饑者必食寒者必衣不可一日無也書元遺山墓石後遺山先生文章行業海内所共知士大夫不敢直以金國百年之論者葢以文𣲖有所在也姜彧魏初嘗辱先生教誨又嘗聞先生之言某身死之日不願有碑誌也墓頭樹三尺石書曰詩人元遺山之墓足矣彧與初適按部河東得拜墓下因買石以刻之先生有文集樂府行于世至於大書特書有太史氏在兹不敢云先生諱好問字裕之遺山其自號也題安漢中紙屏吉甫安侯作紙屏二十用列於所館之室初謂侯位梁州牧秩比漢二千石且少長紈綺中作錦作繡作著色作翡翠孔雀無徃而有不可者乃今樸素如此其亦有意乎否耶侯曰余家滏陽去漢中三千里母老在堂不審一日考滿萍梗何向姑為此以取棄去為輕爾無他意也因為侯言侯能鋭意致治不屑此外物比之視田宅便利則買之玩好詭異則奪之車載馬負去路絡繹葢有間矣君侯此心幸終守之不知者恐有公孫布被之譏故書此為侯他日解嘲云書王復亨三樂堂壁漢中賢良王無疾復亨買亭於黑水之上丐名於余余謂復亨仰事尊君俯友佳弟且致力古學以作新後進是殆孟子之所謂三樂者也因以名之復亨要當進進不已推已之樂以及於人是又望於他日也至於山水之秀花木之蕃兹不必云題劉醫遂通詩卷後余今春因濕疾左股殷腫欲裂宜之王君刺之而愈遂通余未嘗識宜之其婦翁也則其所得必不淺諸公豈其誇哉書傅氏家傳後初伏讀傅氏家傳見東臯先生所與游諸名公因竊憶初年十七八侍先祖靖肅徵君結厦於趙汲古鍾德園東臯與先祖數相徃還時先生年近六十衣冠整肅進止舒徐言語清切承平耆舊風味隱然於接人應物之間聖上在潛邸庚戍嵗以安車徵我先君不幸我先君其年九月即世歸槖中得手澤數紙其一欽承先太后旨令對聖上條陳未盡事宜如定官號頒俸禄功罪有賞罸能否有升降四者治天下之急務又曰農業天下之大本不可不重是故明君重五穀而賤金玉告訐之俗興罰及無辜僥倖之門啓官給不善漢之常平宋之講筵萬世可常行也如此近三十餘條其二則薦中州名士大夫六七十人其曰燕京傅輔之年六十五健行性温實亷介有守通世務可使臨財即東臯先生也近閲家中舊書又得先徵君手澤一紙薦進士有才幹者有文章者秀才者承應者其餘出身者亦有中都傅輔之至亷而幹可以臨財由此觀之則先徵君與東臯先生相知愛者為不淺初奔走於鞍馬簿書之間餘二十年未嘗以此示人傳之者無所考昔韓昌黎謂李翰為張巡傳不為許逺立傳又不載雷萬春事首尾為作張中丞傳後叙用是敢録所以且為其孫夢弼言初與夢弼要不可汎論也先徵君待交友者如此東臯先生為名公所推重又如此則初與夢弼其可不自謹畏所以待人與所以自處者有一毫得罪於先世可乎至元二十七年七月二十有六日順聖魏初載拜書書崔正言傳後初少時讀史傳見有杖策軍門一言悟意朝奏莫見恨相見之晚者輙謂君臣㑹遇之不難也長大來畧涉世故又知㑹遇之不易也君子立言遇不遇不論也苟能切中時病雖留中不報帝不省視世有董狐筆不足為賢良累也崔正言在宋徽宗朝因日食之變上封事論章惇司馬温公之邪正為蔡京所忌排擯不得進後遷右正言乞斬京以謝天下雖不得如所言其風節可槩見矣裔孫道亨以醫鳴河南持其傳以示初切切丐數語以跋初為前軰德業布在方册與天地相終始非晚生後進一言能為輕重者聞令賢嗣觀讀書立行嶄嶄見頭角當始終一心以光大前烈初不肖不克負荷方夙夜祗懼因道亨之請益用感歎故敢以是相告至元嵗壽星月衛分順聖魏初拜手書
