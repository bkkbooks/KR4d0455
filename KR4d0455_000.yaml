body:
  text: 提要青崖集五卷别集類四元臣等謹案青崖集五卷元魏初撰初字太初號青崖宏州順聖人從祖璠金末官翰林修撰以伉直稱元世祖徴至和林甚見禮重璠無子以初為後少辟中書省掾史告歸有薦於朝者帝問知璠子即授國史院編修尋拜監察御史官至南臺御史中丞事迹具元史本傳焦竑經籍志載魏初青崖集十卷文淵閣書目亦載魏太初青崖文集一部七册是明初原集尚存其後乃漸就亡佚今從永樂大典所載詩文搜輯裒綴釐為五卷猶可見其崖略史稱初好讀書尤長於春秋為文簡而有法而集中所記自稱與薑彧同辱遺山先生教誨又稱先生入燕初朝夕奉杖屨是其學本出元好問具有淵源故所作皆格律堅蒼不失先民軌範又其在世祖時始以經進讀旋歷諌職遇事敢言開國規模多所禆益集中奏議一門皆詳識歲月分條臚列中如請定法令請肅朝儀元史皆採入本傳中其他若請緩椿配鹽貨請禁刁蹬客米請優護儒戶請旌鄭江死節請修孟子廟請和顧工匠請罷河南簽軍諸議史所未載者類皆當時要務切中事情今幸遺集僅存尤足以補史闕固不徒以文章貴矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7c86006e7ff046b6c58f097c050c39a86004ceb49fb977e395f025e1d095cb14
