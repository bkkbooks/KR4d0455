body:
  text: 青崖集卷四元魏初撰書上高張二侍御書晚生魏初頓首再拜獻書於侍御高張二先生執事初自揆無似過蒙奬拔何勝榮幸然以懦怯鄙薄不克負荷不得不少布一言以露卑懇伏惟照察范仲淹在天聖中通判河中府召為右司諫歐陽公上書稱賀纍數百言大要謂貴官大職非無可行其道者然郡縣守長有所守吏部鴻臚有所司必若天下之得失生民之利病社稷之大計獨宰相可行之諫官得言之宰相與天子相可否諫官與天子相是非乃知諫官與宰相等初竊謂司諫七品耳前輩猶若是其重况侍御乎侍御天子耳目之官凡所施為要當聳動天下之觀聽况國朝有天下以來六七十年之間風憲之職未始議也今天子神聖動欲稽古內外百司莫不具舉復立憲臺將肅清天下而兩侍御首膺是選是不可獨為侍御賀將為天下賀雖然亦不可不為兩侍御慮也程皓為監察御史進説甚多大要以正心窒欲求賢育才為先神宗嘗問所以為御史對曰使臣拾遺補闕禆贊朝廷則可使臣掇拾臣下短長以沽直名則不能神宗歎賞以為得御史體方今生民之利病何以興除邊鄙之狎縱何以經略錢穀之出入何以會計人材之闕乏何以奬拔百官之賢否何以黜陟兩侍御必有成算矣若有非者彈之有罪者紏之人皆可為則聖天子何獨注意于兩侍御哉二賢相君乂何倚辦于兩侍御哉是知兩侍御之可賀又知侍御之不可不致慮也比來風澆俗薄士氣頽薾猖獗之徒不以唇吻相交取勝則必訐人陰私以為仕途之終南山故中外聞言事者不謂之狂則謂之姦矣間有諄至切中事機之論當路亦藐然一例觀之是以布衣韋帶之士無職分無言責率分一噤不敢少為時吐竒也兹者兩侍御不以初不肖將置諸臺掾之末初自揆不能不知所以得此然以庶幾瞻望大人君子所以肅清天下之德器矣何幸如之而所不敢以身許兩侍御者誠以祖母春秋高初亦愚暗不嫻吏事用敢以是請且古之君子不強人以所不能故人無棄才物無小成季康子問仲由冉求子貢之從政孔子各以其所長答之漆雕開以未信不仕孔子説之初無三子之長有開之未信兩侍御幸哀憐之使不為棄才且有冀於他日幸甚幸甚答郭仲常手簡初頓首拜啓初久以童輩羈纒不獲馳問計必得踈慢之罪於左右何意先辱華翰且激厲其退懦之氣欲引之樹功名之場初自知不肖生生之資且未暇故癡坐如此讀吾兄書辭使人不覺有震厲意特其勢有不能遽然者此吾兄所知也不審當幾何時得脫此蛙湫以少慰吾知巳愛親之念愧歎愧歎王丈回姑爾奉謝令即學問想日就高朗向所請書義標注格式因便示及幸甚臨紙悵然不盡所欲言表賀正表萬彚俱春允協姒朝之正四時成歲載更堯厯之新閶闔天開衣冠星拱中賀欽惟以聖繼聖由仁行仁濟之以不世之才奮之以有為之志量包天地好洽宗親凝神淵默之間允求於治稽古禮文之事方采其宜高麗蒙再造之恩交趾受維藩之禮襄陽可得而不迫以力日本未臣而姑奉以辭為民極以立官酌古而不泥於古度國用以取賦凖今而不專於今謂篆生𨽻𨽻生楷必歷數手而完則人本心心本天當有一代之制規模傑作文物蔚新臣等叨列宰司幸逢昌運雖調劑燮理無禆二氣之和敢舞蹈對揚仰祝萬年之夀奏議至元五年十月六日欽奉聖旨令自堯舜孔子以下經史所載嘉言善政明白直言奏得來者欽奉如此謹具條陳于后皆經史事今略其文用是有尋魏徵之旨一曰正君心二曰教太子三曰任人材四曰愼聽覽五曰辨邪正六曰革舊弊七曰通下情八曰理財用九曰修武偹所得奏者任人材一節而已周顯德元年河南府推官高錫所上書也六年正月六日臣初等靣奉聖旨魏徴般人尋者如魏徴般人無只似魏學士般人尋者臣愚竊謂天下未嘗乏才顧人君用之者如何耳如魏徵者陛下必欲得之亦非難事且徵之所以為徵以太宗之能聽受也若太宗不聽徵雖有經國之才抗直不屈將何所施今陛下將與堯舜比隆太宗之事臣知其優為之也誠能霽至尊至大之威收至聰至明之辨曲屈情意勉強以制禮義使臣下盡言不諱魏徵將自至尚何俟於尋哉一生殺與奪之權人主所司不可使少移於臣下一有所移於臣下欺弄禍患可立至此非臣之私言也書曰惟辟作福惟辟作威春秋稱君能制命為義史記謂能擅國之為王此自古之明戒也雖然宰相所以代君治事者也苟不委任責成則何以辦治此亦非臣之私言也孔子嘗曰先有司赦小過蓋不先有司則事無所統不赦小過則下無全才臣願生殺與奪之權持之當在陛下而先有司赦小過之義亦不可不致論也一人情姦偽不可不防古之治天下者大為防禁民猶踰之在朝廷而失其防則有民不知君如魯三桓之專在邊境而失其防則有尾大不掉如唐藩鎮之亂在諸侯而失其防則有號令不行如秦楚吳越之僭在百姓而失其防則有掉臂大呼睚眥殺人如陳勝郭解之徒是固不可不防也然防之得其道則可以制亂防之失其道則適足生亂若夫用正人用之則當其材而不過此朝廷之防也兵不可不精鍊既精鍊矣必分其勢使權不久在一人此邊境之防也地不可廣民不可衆且遷轉之格今已行之此諸侯之防也民固不可使窮困亦不可太豪富窮困則易以為盜豪富則易以驕亂此百姓之防也陛下必欲防姦偽宜以此防之若以擁蔽之故而使之互相告訐臣恐姦人因此厚誣大臣以生釁端方今已見其漸小則恐迫財賄大則扼其吭而奪之位至有同列不相能聚群不逞之徒而啖之以利使相為訐發當路者莫敢誰何以成風俗甚不可長聖上明見萬里無不昭察臣愚欽奉聖旨故不敢不盡愚伏取聖鑒八年三月二十三日監察御史言法者所以維持天下之具也憲臺則守法之司也方今無一定之法百司無所循守雖省府已嘗奏論未即施行合無從御史臺再行舉奏早定一代之法使有司有所守百姓有所畏避天下幸甚四月初二日竊惟欲致天下之治必求所以治天下之具所謂治天下之具者無他人才是也取人之法具在方册三代有鄉舉里選之制漢有孝廉賢良之科隋唐以來加以詞賦明經遼金因之亦能得人國家有天下六七十年之間取人之法未遑暇及今天子神聖百職具舉苟取之不以法則奔趨請託憑藉黨與無所不逞其私才有一闕則上司所付門下親舊之所囑駢肩纍足莫知適從卒之人才無所得而賄利訐制者取之至有贓汚負罪而投謁有所則已登津要而肆猾狡矣欲其政平訟理恐未能也合無取近代之制若文武舉若試吏員若任子等法至於方技醫卜之術皆以試補則人得其才僥幸之門塞治安之功可期矣四月二十四日竊見聖主即位以來經理天下中書省以總朝綱尚書省以決庶務樞密院以典兵御史臺以紏彈非違其統而一之能分陛下之憂者聖慮固已定矣竊見燕王嘗欽奉聖旨守中書令兼樞密使名雖如是實則未聞當今之計宜妙選天下賢而有德業者輔翼燕王欽依已降聖旨領中書省凡軍馬刑殺大除拜大錢穀及應合聞奏之事須先啓白燕王處決然後入奏如是則政柄歸一聖慮少安而天下國家之大本定矣四月二十四日竊惟君猶天也臣猶地也天尊地卑禮不可不肅方今內有太常有國史有修起居注以議典禮紀言動外則交趾稱臣高麗入貢日本江左瞻望德化自祖宗開國以來其創法立制至陛下為最偹故外域逺方企仰朝廷以為中朝禮義之國昨聞御前食肉負者祼形舞唱恐非所以正朝廷待臣下尊天子之禮也自今御前不可作此戲舉務存大體天下幸甚五月七日照得近例州縣不滿千户者合併又軍户鄂囉轉運司俱各併入總管府所以省冗員禁侵擾也竊見目今除諸王位下户計外係大官數目內送納差發米糧種田等户如耶律丞相南合中書楊中書賈達阿嘍罕等投項甚多其各官頭目俱有長次及首領官令史催差人等各人既無俸祿以養亷則侵擾之弊不能不無以此參詳既是依例納絲銀人户合無照依合併州縣鄂勒轉運司體例并入見住州縣與民一滚通行科差若有合回付絲銀去處令於官庫內驗數支取不必更為設官如此似為官民俱得便益據元管頭目於內若有曽受宣勑勾當年深人員擬合量才任用五月八日襄陽蕞爾一城國家以河南一道加以內地供給自始功迄今幾三年矣未有成效今水潦方漲彼必大舉來援我軍雖已成圍亦宜據守險要厲兵秣馬以需一戰此正諸將用竒應變之秋也朝廷宜遣使以此戒諭將士且點視兵甲卒伍糧餉之有不利不偹者督責合屬官吏使必致精利完偹以圖事功若不早為偹禦使必內外相應突圍以走縱得空城夫復何益不惟不償所損亦有以虧損朝廷師武臣力之望伏乞詳酌施行五月十六日比聞朝廷以山東蝗旱民多闕食已差官給糧賑濟及倚閣懸欠稅糧其民固已幸矣外據鹽貨見行樁配其法施之豐穰之歲猶有所不堪况其蝗旱之餘闕食之際豈可不為之更張哉今體知得其鹽貨在先令瀕海去處樁配今滕嶧淄州等處去海七八百里俱各樁配每户月樁配三斤以毫釐品答近上户計每年不下樁配鹽三百斤每斤價鈔四分絲絹麻布並不收受大絹一匹長二丈八尺重一十三兩於街市倒鈔七錢布一匹長十八尺倒鈔五錢然後赴鹽局送納又立主首賫信牌立限約催督民户赴州縣官局關買逺者離城三百餘里正於農忙時分往復不下十日每年四季如此及到城無錢多於鋪户之家借貸以應官司督迫之急及關買出局却於城內每斤折二三兩依市價轉買每斤價鈔三分賣訖鈔却還元借鋪户參詳今既給糧賑濟又倚閣懸欠稅糧則朝廷優恤元元之意可謂深切著明矣如上件鹽貨事理更為從長講究施行是亦賑濟之一大端也古所謂惠而不費因民之所利而利之蓋近是也五月二十七日今體知得外路客旅於上都和糴所中納米糧皆揭利錢於隨處糴到白米至元七年十二月內般載到和糴所永盈萬盈兩倉下卸中納其兩倉見百姓搬載米糧數多推稱元糴糧數已足不肯收受百姓在客日久牛隻損死盤費俱盡將所載米糧不得已折本賤糶本都官豪富要之家釐勒減價收糴却赴倉中納倉官通同看循便行收受其客旅如太原王烏德美西京杜阿薩爾馮琪李春等納到米糧皆刁蹬不受見於兩倉露地堆積約一萬石以致損耗委是生受參詳上都每年合用米糧不下五十萬石故增其價直令百姓和中所以偹國用便貧民也今客旅所中米糧兩倉刁蹬如此見有露積至今者脫因雨水變壞則百姓揭借鈔本無以倍償况敢言利乎夫細民圖斗升之利不逺千里來應和中若如此刁蹬恐四方不信後無以應糴者則國用之須將何所仰目今雖收中米數已足若將在倉露囤客未驗數更為收受不惟救客旅倒懸之急亦所以偹用示不失信於民也并據倉官見客米多稱推數足閉倉不受致令官豪富要勒價賤糴却中納入倉隨即收受其情弊欺公害民莫此之甚合行嚴加禁治今後有無驗實到倉米數不問貧富依月日挨次收受將當日實收米數及合給支鈔人名姓只作一串赴支鈔庫照驗關支如此不惟不能作弊害民其勾當官吏亦不至破家獲罪五月二十九日近為察到上都萬盈倉飛鈔事就問得監視官運司知事趙瑄曽於巴圖軍人烏爾古處買到支帖三百石每石用鈔一兩二錢却於官庫內每石關支鈔二兩五錢已行具呈御史臺照詳施行今參詳得國家蓄糧本以養軍而糧及於軍者不足此一弊也給鈔以中糧本以便民而糧不得盡中其弊二也養不及軍便不及民官庫之鈔隨於富強作弊之手其弊三也三弊之生生於買籌而已今後軍人及應合支糧者有無聽從所願就令發帖官司審問軍人及應合支糧者若欲用鈔先取本人文字開寫正支米糧折支鈔數各各數目其米價若在和糴未足其間依官定價錢如於收糴已足之後隨倉米市價從實折算其發帖官司憑準合人文字據正支米糧下倉放支其折鈔數下庫支訖仍於本倉門首分朗出榜省諭軍人及應合支糧人通知仍禁約不得私下買籌賣籌或將支帖抵還欠少錢債違者並行治罪如此則軍得實用官無虧損是亦革弊之一端也六月五日竊惟皇后之尊與天子同體上以供奉天地下以承祀宗社故歷代天子即位册文玉璽隨即行之所以崇三綱之始正風化之原也今皇后母儀天下已十餘年册璽之禮未覩施行伏乞御史臺奏聞下太常翰林講求典故以行册禮天下幸甚六月十七日照得唐制宰相修時政記月送史館又起居郎天子御正殿則對立於殿下有命則臨陛俯聽退而書之以為起居注凡册命啓奏封拜罷免悉載之史院嘗欽奉聖旨修纂祖宗事迹恭惟主上即位以來立宗廟議禮樂定官制百度修舉今兩省臺院及修起居注凡有軍國大政并册命啓奏封拜罷免等事合從中統建元及今見行事理逐月送付史院以修實録則主上之豐功盛烈有以光耀萬世亦臣下所當為者七月十三日風聞中書省奏特訥克國王與亷平章北京行省事竊惟趙右丞往年嘗與國王行省東京等路能審量時勢緩急且勤恪不怠遂成安集之功今若繼往則彼中民情物態偹嘗之矣不惟與國王相得庶幾事易辦而民易安亷平章明敏有為若請還省則內外俱便初人微名輕職當言責見有便於國家者不敢默默八月十一日竊惟國家開創以來其增崇文物講求典禮莫盛於今日然大端大節猶有所未周者蓋啓白開導之有未至耳方今孔祀絶封廟户當差其餘儒戶已有散至田帖者數年之後切恐聖道湮廢推原其自無大人君子以主張維持為已任故也照得見在儒户各散漫州縣無所統紀非若釋道二家而有以總之也故其利害安危無一人曽加省者竊見翰林丞旨學士和爾果斯朝夕侍從且賦性雅重若使之管領諸路儒户必能教護有方是亦維持聖道之一節也又照得太常寺舊例奉行典禮之司初無户口統屬今太常卿哈坦所管禮樂户近五伯户翰林在今日為衣冠之表率使之管領諸路儒户亦為有例竊謂天下之事有似緩而實急似迂而實切者蓋此類也十月十一日竊惟古之將士所以敢死勇於立功者蓋上之人有以激勸之使然也不爾將偷卒惰望其有竒功於天下不能也聞故河南路統軍鄭江於今年四月內襄陽城下以戰而死迄今幾半載朝廷無追奬之命今來參詳國家方混一區宇苟死於王事者不加追奬則偷安苟容之徒以為得計照得近例以他功追封者往往有之彼被堅執鋭不顧死難為國家報效者若不量加追贈切恐於激勸克敵制勝之術有所未盡十月二十三日照得在先提舉諸路交鈔如王渙等以户部郎中兼之制府總領天下錢穀與户部不相統屬故别立提舉官尚書省令總領六部如運司鐵冶已皆併省外據提舉司官亦合令户部兼領所以一錢穀之司省周嵗之費也據見勾當官吏如無粘帶乞依例升轉似為相應十二月十五日竊見西南國家重地其所以撫養軍民鎮服寇敵必得朝廷名德大臣才幹有為者然後為可今賽平章已經停職打算其綱紀省事者宜為遴選其人伏見廉平章明敏有志度在間日久若應是選實為朝廷軍民之便至元九年二月二日竊惟京都天下之根本要在殷盛以鎮服乎八荒古者隆上都而觀萬國蓋此意也比年車駕臨幸修築城闕調運糧草一切應辦和買俱以中都百姓倚辦比之别路實為繁劇側聞將與外路一體簽軍不惟內外輕重不倫且示天下以不廣也輦轂之下何至如此驚擾二月十九日竊見大都路近蒙聖恩赦免今次合簽軍數大小臣民無不欣忭比聞市人傳布將所免大都軍數俵散外路補充元額切詳內外臣民皆朝廷赤子天子聖明以大都應辦和買比之諸路繁劇故有此非常之恩若復俵散外路實為重併必欲不失元額自合以錢招募必得勇力之士足為國家驅用如更不然合無將河南乾討虜等軍簽入正軍不惟足以補充軍額亦所以正聲罪致討之名比之乾討虜蓋有間矣二十四日照得欽奉登寶位詔書內一欵節該五嶽四瀆名山大川歷代聖帝明王忠臣烈士載在祀典者所在官司歲時致祭欽此竊惟孟子亞聖其鄒邑廟貌歷代崇奉未嘗缺廢今國家增崇文物髙越前古比聞鄒廟摧圮祀禮湮絶今來參詳擬合官為修補庶幾仰副聖朝崇尚文德之意四月二十五日體察得大都自今年正月至今被強盜劫掠數起未曽捕獲參詳都城輦轂之下四方輻輳人物繁夥今強盜如此若不遴選捕盜官吏及督責府尹等官切恐積弊既久人無所畏則無所不至矣若夫省浮費薄賦斂去雜冗之擾使民重本抑末倉廪足而知禮節此又止盜之本也五月二十五日至二十六日大都大雨流潦瀰漫居民室屋傾圮溺壓人口流沒財物糧粟甚衆通元門外金口黃浪如屋新建橋廡及各門舊橋五六座一時摧敗如拉朽漂枯長楣巨棟不知所之里閭耆艾莫不驚異以謂自居燕以來未省有此水也伏惟兩都宗廟宫室省臺府庫一切軍國所須具在於此今雨才兩日巳漂沒如此脫有自三日以往之霖切恐為害未必止此參詳兩都承金口下流勢若建瓴其水潰惡平時猶不能遏止西北已衝渲至城腳若積雨會合漂沒偶大於此則所謂省木石漕運之費收藉渠灌溉之功恐未易補償也又照得金世宗大定十一年尚書省奏請開瀘溝以通京師之漕從之至二十七年尚書省奏孟家山金口閘下視都城髙一百四十餘尺從來止以射糧軍守之其人不足倚用若遇暴漲時或有作過人等所係利害非細宜行閉塞其所灌稻田俱為陸地種植禾麥亦非曠土不然即乞更立重閘仍於岸上置掃官𪠘署并掃兵所居庶幾用心巡護不致踈虞世宗是其言委官相視於是竟塞之大抵興建事功必較量利害輕重而取舍之利重於害猶當舉行若害重於利安得膠柱鼓瑟而不為之更張哉恐其姦惡竊發前代固已慮及且以今日傾圮室屋溺壓人口流沒財物糧粟等事勢觀之莫若塞金口為便七月十七日照得唐制常參官及刺史上訖三日後舉一人自代况巡行紏劾之任與常敘例轉不同者乎夫郡縣之職以撫字為功故必以日月滿考然後轉敘惟按察官與監察御史則不宜然蓋人情久則熟熟則慢慢則事不立矣目今按察官已有過滿去處未有轉代監察御史必待例滿代官至然後離職皆非計之得者也合無令按察官及監察御史在任一歲後不問內外各舉資望相應者一人以自代不惟可以作新風節起厲頑弊亦可以廣收才能以憑倚用七月十三日竊見天下之事具在於省省之事責之六部六部之事其呈覆出納在於各科分令史由是言之部令史名雖卑其掌行為最要其所係為最重得其人則庶事流通無所壅塞不得其人則叢脞隳墮詐偽百出若近者插補撿目冒用中書户部印信及扯毁關撿等事推是心以往將何所不至望其政平訟理恐未能也目今各部正補吏員如無過犯能以廉勤自律有幹局者不必追其既往若科分果有繁劇令史闕少亦合約量收補如更不知警懼敢為欺誑者當隨事黜罰則能否有别矣方其資考未滿則掌握機柄既滿則臨治州縣苟非其人將何以堪之擬合定立格法如歲貢之例守一不變不輕以他道入補則人無覬覦知所勸戒奔競之門塞矣六部諸路表率若不先為振肅四方將何所則效方今之急是亦其一節也七月十五日竊見上年包銀絲料稅糧等差發隨路俱各驗貧富品答均科今體察得隨路新簽軍户多係各處近上户計止依額除訖包俸鈔五兩外其餘􅝔兊下數目却於近下户計驗正額科撥及一切橫雜科著名為和買有司不即給價等事為此略問得安平縣尹孔奎稱本縣新簽軍七十七户內止當絲投下一户外當包銀户七十六户俱係近上户計元當包銀二十四錠七兩四錢七分每户依額除訖五兩該七錠三十兩外􅝔下包銀一十六錠二十七兩四錢七分又老幼户添到包銀六錠三十三兩二錢五分又槩省人夫盤纒等鈔一十錠八兩替真定府麯使司散下碧香麯三千七百斤即時勒要鈔一十四錠四十兩已上四項計八十八錠八兩七錢三分又和買造甲皮船馬匹一切等物自八年三月為始至今一十五起除納本色外折納訖鈔六十五錠三十二兩七錢四分四釐巳關鈔二十一錠一十七兩七錢三分未關鈔四十四錠一十五兩一分四釐今來參詳安平一下縣耳自八年三月至九年五月十五箇月內除元著包鈔其􅝔下新軍差發并其餘科著計銀四十八錠八兩七錢二分又和買除本色外折納訖鈔六十五錠三十三兩七錢四分四釐以一縣而計之一路以一路而計之天下其􅝔兊科省及和買不即給價豈止此數而已也今計國家宫室廩祿之費宗藩歲賜之常加以南圖江漢西鎮川蜀東撫髙麗而來日本歲不下纍萬計求其所出不自天來出於百姓而已若百姓富實何求不獲何事不成苟一旦耗損則流亡寇盜靡所不至然則為國家成長治之業建久安之勢莫若培植此百姓而已如不於此加意恐漸涉消乏今略以包銀俸鈔比附亦可見其大槩云耳元每一十户額當鈔五十兩內包鈔四十兩俸鈔一十兩驗貧富品答均科除壬寅至今纍次簽軍該簽訖三户其軍多係近上户計權以十兩為率三户該納包俸三十兩今官司依額止除豁一十五兩外有近下户七户元著二十兩每户該二兩八錢半今官司依額科降該三十五兩比與上户通滚品答均科時該添訖一十五兩每户該添二兩一錢半又代納弓手并事故等户差發其絲料稅糧課程和買諸物修城人夫亦與前項一體事理合無將軍户依額除豁五兩外其餘數目於正額內從長講究量加減免似望不致耗損則日庶月富足以成吾聖天子太平之功俾斯民以享有生之樂不亦美乎外據和買國家調度不一不能無之但有司以理給價民不為擾若以遷延為能尅剝為功竊恐名為和買其實則幾於掊斂若不改更伏慮迤久不勝其弊九月十日竊惟父母三年之喪從古以來無貴賤一也今之居官食祿者為下民表率有不幸遇此則或一月或十數日巳棄去衰斬從事官府起居飲食衣服言笑與無喪同其毁傷風俗敗滅天理莫此之甚是豈獨非人子而安忍為此不情之舉亦風教之道有所未盡而然也今體察得大都路霸州益津縣臧縣尉於今年六月內以其父喪奔赴安州高城縣及還職往復計住訖二十七日八月內承州帖坐奉總管府劄付該偹申省部奉符文除往回馬程外給假一十五日承此總府下本州依上照會又云照得不即聽候上司明降一面令本官前去事屬不應今後應申告假官員須候申復明降無得似此違錯今來參詳應告假官員須候申覆明降方許離職理固當然奈人子聞父母之喪如天摧地陷五內崩裂安忍一日寧居若與常例須候申覆明降於理未允合無自今凡有父母之喪聞命即往不可以常例拘更許告丁憂俟服闋依例轉敘若其人才力深長非此人不能辦此事必須倚用然後奪哀起復則又其變也自餘皆令以禮居喪亦所以厚風俗存天理也十月六日竊惟國家愛養百姓所以偹用也雖用之亦當愛其力而使之以其時耳以其時則力不盡力不盡則用無窮今國家修築宫城此正用民之時也然用之苟奪其時切恐民力有時而盡無以供吾國家之用目今大都供役人夫自春徂秋雖支鹽糧工價實於農務有所妨奪為此就問得户部鹽糧科令史燕珍呈每夫一名日支工價鈔一錢三分鹽糧計該一分工項計該鈔一錢四分人户有慮妨歲計除各得工價鹽糧外更貼鈔或一錢或一錢有零顧覔人夫替代今來參詳合無將合給鹽糧工價鈔通折作鈔更少加分數令諸路召募少壯不服田畝之丁俾長用供役按月支請工鈔戒董役之官使少寬捶楚則子來之民不獨見稱於昔日矣十月八日太廟省牲為不見用犧問得太常楊寺丞稱為此已曽聞奏今來參詳祭享太廟國家大事三牲之禮自古為重今特用羊合行復奏以偹供祀祖宗之禮天下幸甚十二月十一日竊見大都修建宫闕合用諸色人匠每年逐旋於隨路樁要至有逃避隱匿煩勞有司勾捉不惟失誤造作恐積久民力不勝煩擾之弊今來參詳合無於各處取會諸色人匠見數依和顧之例以理給付工價利之所在人將趨赴古人謂恱以使民庶民子來者正在此也若以謂國家畜養百姓正欲有用必每事和顧恐府藏之積不足以供無窮之應竊謂不然今國家以榖成金以桑成銀使民力不困則何事不成何求不獲苟不措畫以道切恐一旦雕弊甚非栽培國家根本之意也至元八年十二月二十五日欽奉聖旨節該泰和律令不用著休依著行者欽此風聞史開府與諸大老講定大元新律積有歲月未覩奏行今來參詳周因於殷殷因於夏固有必不可更者至於禮樂刑政小過不及之間因時損益亦不可以一律定也泰和之律非獨金律也旁采五經及三代漢唐歷代之遺制耳若刪去金俗所尚及其勑條等律益以開國以來聖旨條畫及奏準體例以成一書即至元新律也且法者所以維持天下之具在御史臺尤不可不以立法為本正月二十一日竊維御史臺天子耳目之寄自本朝官以下宜妙選朝廷名德大臣為主上所倚信者一員足以坐鎮雅俗庶幾合天下之公望以振起臺綱此非一人之私言實內外之公議也三月十五日伏覩皇太子册立禮畢此誠社稷生靈之福逺近臣民無不欣忭其所以鎮服藩國之心係仰天下之志正在於今日昔成王幼沖出則有周公召公太公史佚為之訓諭匡直之入則有太顚閎夭南宫適散宜生之徒為之輔翼周旋之故能制禮作樂興建太平為周家八百年之基今皇太子仁孝四海屬心獨官屬尚闕宜博稽賢才妙選朝廷耆舊有聞望德業者為之保傅及明通政事謹密有器局者為之左右前後則凡所施為必有超絶所謂鎮服藩國之心係仰天下之志蓋在此也不肖職當言責區區之情不敢不盡八月四日竊見兵法先為不可勝以待敵之可勝又曰師克在和不在衆今襄樊新附宋人惱懼乘機抵隙混一之議固在於此然或措置乖方規圖未盡切恐未易有功比聞河南等路行旅往來傳説新簽軍三萬河南民户數少加以貧乏或三户五户併作一軍向來困逼襄陽飛挽之勞數年於此重以今歲水災巢居野處衣糧俱盡單弱怯懦自救不暇又安敢望其得用哉古者將拓土宇必培植邊鎮使之強盛然後可以立功若藩籬摧弱不惟不能有功切恐鼠輩窺窬易有驚擾合無移咨樞密院再行講究聞奏施行六月二十一日竊惟際天之下皆朝廷赤子初無內外之間古人由近以及逺故有先後緩急之勢大扺京師根本也四方枝葉也根本盛實則枝葉茂密此必然之理也殷周王畿千里諸侯大者方百里秦漢徙天下豪強以實京師亦所以強幹弱枝隆上都而觀萬國之意也若京師根本不固四方脫有風塵之警飢饉之虞則何以鎮遏寇掠今竊觀大都形勢則四方之根柢也其百姓宜加愛養厚其力以固根本乃者近餘年間其賦役科差比之外方更為煩重每歲除包銀絲料課程稅糧外略於總管府各科分取問得打造石材般載木植及一切營造等處不下一百五六十萬工和買稈草燒草又不下數十百萬束料粟不下數十萬石車具不下數千餘輛其餘雜細不能縷數也今來參詳曰買曰顧非常法也前代不測則用之今一一逐旋顧買侵漁之徒又因而剋減致使官民不相信凡所給價以十分為率必掯留一二分俟估計體度定然後破除放支行移遷調有數年不得足其價者今營造方始此等事不能遽已要當講求良方擬定價直明示榜文鈔出則貨入貨入則鈔出使侵漁之徒不能少有剋減倘計置不盡不測必用之物宜比市價稍加增添利之所在民爭趨之何患有不辦者哉且夫民之所以不飢寒者以其當耕而耕當織而織耳故農有餘粟女有餘布今農事方殷夫役若此安得不妨奪歲計欲民力之不困不可得也大都四方輻輳間民居多若將見支工價鹽糧餘上少添分數明示榜文召募赴役不致剋減亦足以濟貧民倘召募不足當農隙之時遍及則可也若農事未隙除農民之家其餘諸色人户時暫科差亦不妨奪農務不誤造作似可久行兼本路鹽貨與外方亦更偏重河間每袋重四百五十斤價鈔一十四兩一錢一分四釐山東每袋重四百五十斤價鈔一十二兩六錢六分二釐大都每引重四百斤正該鈔一十六兩三錢又利祿錢七錢每引通計鈔一十七兩比山東河間斤重少五十斤價鈔比河間多二兩八錢八分六釐合無照依河間山東酌中定擬價直官賣鹽引從諸人興販則足以少寬民力是亦愛養之一節也古者將用民力必先有以養之養之既富而知義然後用之則何功不獲何事不成今國家方將混一區宇輦轂之下頗涉困弊利害非細主上仁慈愛養元元如近者免徵積年拖欠之錢債除豁軍人垜兊之差發皆希世之洪恩得復覩於今日是誠生民之大幸社稷之永福也如大都和買和顧夫役鹽貨等事與所以培養根本之意特未有以達之耳四月十六日竊惟襄陽宋人名藩今既失之豈無惱懼且吕氏彼國大族與之抗衡者必因此有所誅殺此誠可乘之機也為今日計莫若待吕安撫以殊禮加以寵名置之於內别選吕族可倚用者與國朝名卿共守襄陽宣布德澤秋毫不犯分遣諸將水陸並進則人心不搖混一可期矣若待彼措畫既定人心稍安則大事去矣此機間不容髮廟堂之上必有成算誠以區區之情職當言責不得不爾二十年五月原缺日治書侍御史行御史臺御史大夫相威奏罷日本之役奉旨不準切詳盜賊草竊人民流困加之飢饉軍旅勃興不勝搔動相威所言社稷生靈之福也雖聖意時暫不允本臺自合執奏至於再至於三期于便國便民而後已則天光必有回照八月原缺日竊謂古之用人以考能否為本今不過通算月日抑其資品而已其於古人考績黜陟之意蓋無有也直至各官贓汚發露才有停解降等之法其於所管部分人户果安而無逃移者乎盜賊果息而無耗亂者乎詞訟果簡而無寃抑者乎賦役果平而無偏重者乎田野果闢而無荒蕪者乎是之不論直以受錢得罪驟升乃降此治之所以未臻也今後某官在某任歷某月日於五事某事不辦可中是何等選縣考之於州州考之於府府考之於各道按察司御史臺歲終奏遣監察御史分道考按得實呈省其各道按察司亦以所屬路分通考五事之殿最而升黜之夫欲考按如此而取人之路不可不謹今司縣司吏取之無法因之以升州升府以至部臺院省莫不由此途出與夫諸衙門創保人員皆經營求請而得之積以月日以之臨民以之治軍以之典財賦以之任風憲求之超出倫輩肯為國家效力者幾何人哉前代有鄉舉里選之法賢良方正之科如科舉如任子如試吏員其途不一也今止於貼書寫發之間取之豈能盡天下之才合從吏部與諸名德講究定一代選舉之典則人才有望澆風可戢矣至元二十三年十二月十一日朝列大夫侍御史行臺事奏事房十月二十日巴林集賽第三日香殿內有時分本臺官伊蘇特穆爾大夫實哩瑪勒中丞阿實克特穆爾中丞崔中丞們都展侍御和爾齊納古爾竒拉爾舒庫爾齊阿實克阿拉巴延殿中巴哩巴實寶齊特穆爾布哈等奏過事理合行開坐具呈者一奏俺每臺裏遷轉底官人每待奏博囉岱每一處去底伴當每兩箇臺官兩箇都事四箇監察這些有上位不認得底人每奏名字那沒欽奉聖旨你每説者奏如今博囉岱每新去底人每為那上頭俺這裏臺官魏學士底孩兒魏治書為好人底上頭交去麼道商量來更張夢符小名底人先是按察副使勾當來如今保定府做同知有他是好人底上頭他根前交一處去麼道啇量這刑部裏筆且齊頭兒畢主事小名底人再一箇做縣令來底和九思小名底人這兩根前筆且齊頭兒交做都事去麼道啇量來再四箇監察有體例幹濟底好人委付交去麼道啇量來欽奉聖旨這底每我不認底有你每識者交去者雖那般呵交我覷我雖不認底呵見他每面皮呵理會底也者欽此奏事房十一月二十丸日安圖集賽第三日香殿裏本臺官實哩瑪勒中丞阿拉克特穆爾中丞崔中丞們都展侍御和爾齊奈曼岱呼爾察舒庫爾齊阿薩爾巴哩巴蘇蘇勒圖們都奏過下項事理覆過奉臺官鈞旨付禮吏房欽依施行合行移付者一奏博囉岱每一處去底伴當魏學士底孩兒更兩箇做監察去底張瑀周祚再這箇筆且齊頭兒做都事去底畢主事更六箇達勒達監察去底數裏福努這底每月奏呵聖旨問了各人根腳教去者麼道聖旨了也欽此竊聞欲清其流毋濯其源欲求治人先須自治憲臺為天子耳目之寄拾遺補闕進賢退不肖使百司畏肅內外乂安此其職也今務訐發陰私追究贓物簿書堆積過於有司比者臺政一新有合講究事理開具于后一御史臺官監察御史此非常選前代多出自宸𠂻自餘紏按之職宜中書省選奏若有不當御史臺劾之而已今自作一選其間或公或私或可或否不能不招物議一贓罰庫前代無此例御史臺職當紏劾若有合追贓罰付之有司令御史臺察院自行追理另置贓罰庫雖赤歷按驗明白終非其體一各道按察司書吏不宜止於府州司吏內選取宜兼用儒生之通逹事物者府州司吏習雖既熟能卓然自立者有幾一旦處清要之地掌進退與奪之權所以閧招物議者多本於此一各道按察司奏差察事問事甚為不便如奏差專以察體究問不知司官掌何等事且操縱與奪之間豈能盡公今後宜減奏差之員之半以補書吏體察究問司官當自為之奏差承奉使奏可也
