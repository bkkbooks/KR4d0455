body:
  text: 青崖集卷二元魏初撰六言詩奉答亷公勸農亷君以御史𢎞道六言二詩見示因次其韻又作廿八字奉送吾同寮太原之行小烘茶瓶帶臘新封酒甕迎和醉裏西山南浦眼前仰嶺髙堝滿眼江山圖畫五年風浪窮船誦讀愁無眼力裁培正在心田章江晴緑逐春生鐵樹祠前有此行人笑青崖癡老子愛君古意未忘情港口舟行是日室人生日寄此為壽歳歳逢君此日相望長在他州風雨吳頭楚尾五年才共行舟今嵗纔春又别洗粧應在書樓細卜歸來消息荔枝紅徹迎秋七言絶句贈髙道凝侍御道凝之尊君侍郎先生在中綂末建元之前十年我先大夫玉峯被召薦中州名士大夫六七十人有曰西京髙聖舉年三十已上博學善屬文通世務有器識亷介有守可使臨財亦可以臨政歳丙辰遺山元先生入燕初朝夕奉杖屨曽聞其說今之能文者李之和髙聖舉人莫之識也自後初嘗求先生之文如記如序如詩文徃徃讀之不能舍去道凝初相識歳久未嘗以事相接至元二十年初承乏江西憲司道凝已彌綸省闥有日矣用是得欵奉言教今行臺金陵敢以四絶句歌詠其梗概云吏部真純玉不如濟時心徹五雲車中州名品存公議先子垂亡有薦書吏部文章不近名悠然流水與雲行百年文柄遺山在曾道波瀾獨老成中郎才業自家傳際遇青宫倚注偏最愛兩年無一事雍容籌筆直如椽江南驄馬舊知名共喜金陵有此行去去鳯凰臺上月拍江風雨聽秋聲贈李吉甫故人相見眼增明尊酒殷勤且未平恨煞簿書塵土裏兩年寂寞度秦城贈史子桓泣血尋親白髮兒牛腰半是昔人詩傷心四十年前夢一片白雲無了時贈宋碧湖碧湖老子識朝賢白璧明珠有此篇青眼相看豈虛語不妨收是買山錢趙伯㳟母八十養心戒飲不易得讞獄平反陰有功聖善壽徴應在此百年無日不春風峽山寺擘破深青太華雲中浮濃緑是通津畫圖盡有江山在紺碧瑶環恐未真寺傳有袁氏玉環故事宣德曾侍蒲輪四月行入冬風雪哭銘旌到今三十餘年事依舊山圍水遶城寄揚州金使君兩年不到摘星樓鴈隔江聲送客愁昨夜金山船上月澹隨帆影過中秋栁潭垂釣陰陰楊栁一絲風脚底行雲在鏡中不為君王肯同載便將烟樹換齊東巡按京兆口占二首二月五日巡按京兆諸君祖道漢中城北醉中口占二絶至陳倉書付金州邸萬户之第二子持去憶昨春風石馬園園有石馬二不知何代墳也偶因離别却成歡杯行交錯殊無意酒到轟騰不屬官此别分司拚數日渾教聚首是三年臣門如市心如水有底藩籬不醉眠記昔寶殿光輝記昔遊川原風物入悲愁兒時曽識東園老彈指中間到白頭望漢王城漢水之北有原峻削其上砥平土人以漢王城目之至元十五年因課農登法隆院閣時山雨乍晴緑野平逺在奔走覊鞅中得凭髙佇目亦一快也乃書此以識陰陰樓閣復層層脚底風烟緑樹平行到上方人不見倚闌獨有漢王城獨石打頭土屋椽如漆容膝荆牀雨似秋分例一杯糜子酒幾時能近鳯凰樓洋州公宇讀文與可蘇東坡詩刻篔簹太守雪堂詩花滿亭臺酒滿池今日水空花老盡一庭秋草罥蟲絲宋氏家藏花光墨梅人説花光物外仙文章豪客欲移船春風留在三花樹要與東溪結後縁束溪總尹漢臣自號也亦善於梅事故云寒食不出想得西湖放滿船御街楊栁已生烟輕風細雨無人到獨立海棠花樹邊冬除行役經秋未到家入冬消息望燈花擁衾坐數更籌了明日春生喜有涯贈筆工李子昭廣寒秋頴雪離披湯沐中書舊有期千古管城今樂地未應人笑是書癡雲中郡賦雲中一首雲中近代稱名郡樓閣風烟亦可觀一上官庭傳徳語文書如湧事如攢獻龜六月二十二日予降日也青溪早發舟人以龜來獻自嘆元非搏擊才海南歸棹趂風回一杯湯餅逢今日獨有河神獻夀來放龜繞足青毛背縷金未應無意出江深從今去去清淵底珍重千年共此心送李兩山南來喜見兩山詩袖裡春風鬢欲絲明日朝京五千里正如賈誼入關時送李鶴田樂章十二見才情掛劍文章老更成吉水一椽茅屋在不妨高卧㸔秋耕送敬伯仁床頭白酒屋頭山未老誰能得此閒收拾寜山哭麟解更休容易向人間送耶律百强不是孤高不愛官過庭長恐負清歡一盂菽水還家日衰俗中間得此難送楊季海交親零落鬢如絲兩袖秋風一束詩明日還家有人問青衫不似讀書時險阻艱難四十年西溪詩筆舊情縁珠簾寂寞西山雨又逐孤燈上客船豐州五更騎馬望明星細草坡陀迤邐行一片長川天不盡蕎花如雪近豐城溪亭午憩傍溪亭子蔭龜魚花竹迷藏畫不如檢㸃江頭春事了不妨高枕卧㸔書三徑納凉闌干欹曲䕶羣芳恐似陶家欲就荒日午坐來松影合南風吹雨似秋凉題陰徳記後大定間漳州董公為道源李先生撰陰徳記書二本一備史館採訪遺逸一遺其子師孟俾知仕進之所來由嗚呼前輩喜人為善且樂於激勸其意味乃如此道源先生之遇不遇雖與文正公不同志則一也其為人必不凡故為時輩所重敢作詩以識之不為良相願為醫落落胸中亦自竒一片活人心思在百年名筆有真知峽山寺别雲憲使文宣慰詩人李梅南來時船疾不曾登去日星飛又促行徑為諸公暫留别四更燒燭㸔題名代州别劉雲溪公愛我疏愚獨數君愛君真實更何人相逢不惜相將去醉倒玉壺别有春寄逺别千里長河五年戍萬山風雪斷來音屋頭昨夜霜如席愁折金閨一寸心田家謡五月軍回未有期不禁烟瘴入枯脾馬頭一骨還家日只有弓刀似舊時為戴秀才題張騫乗槎圖一片枯槎物外仙浪花如雪水如烟只應直到天開處冷笑閒横盡日船新寨二首萬事乘除不可期此行休怪到家遲千山萬水秋光裡盡是君家得意時送别交親有所思却愁騎馬到家時從渠㸔得青山飽人事如今不要詩𢎞州百年雄傑玉屏老疑有英靈在此間幾日隣鄉買田了閑時騎馬看南山出湓浦寄劉牧之九江一月又吳東千里青山半日風昨晚看潮亭子上一尊白酒與君同胡仲濱益堅齋不為求名效獨醒不縁蹭蹬便忘形留教吏部文章在盡是君家座右銘宿神溪千丈危巔鳥道斜萬山深處有人家年來常有催租吏却恨溪流片片花醉吟一别醉鄉千古夢無邊塵事百年身青山滿眼花如錦莫遣劉伶笑殺人杜止軒詞翰方朔才名語意新牧之風調筆如神龎眉苦節秋風客未必如公出處真十月見蟢子戯成蟄後垂纎見亦竒只應佳信示前知牀頭鏡子拈來㸔未分清霜入鬢絲松澗張君老澗陰深百丈崖崖巔松影矗雲開幾時得向松間醉細聽秋聲帶雨來梅坡張君曲水亭邊酒一巵風流文雅記當時而今西去船頭月除有梅坡五字詩竹山張君山上亭亭竹萬竿山前花木曲闌干高情誰似山人好教子讀書不覔官竹冷拂苔痕緑影香細抽空碧出鄰墻風來瑟瑟驚秋寂雨過梢梢弄晚凉送僧遊蜀峨睂山色錦江春劍壁空嵐玉壘塵别後登臨有佳句不妨忙却坐禪身港口舟行雞犬山田計未成白頭又有海南行只應湯餅逢今日兒女相㸔話此情送周集賢正平致仕東歸江山如畫四時春獨有􅳖陵氣象真館閣風流有今日鹿庵之後更何人寄耿伯玉臺掾愛君情味唱君詞一别秦亭有所思碧玉骰盤荔枝酒夾城花暗獨來時嘉慶圖小小瑶華楚楚蘭茶芽瓶子荔枝盤太平三百年前事猶及江南畫裏看劉漢卿蓮社圖不為廬山面目真不因詩酒自由身高情未落龍眠筆元是羲皇向上人畢舜舉蘭亭圖歴井捫參蜀道難扁舟江海又狂瀾昔賢觴詠今無復畫裏風流亦好㸔伏生授書圖心傳心學見都俞秦火燒來一字無若道漢儒無補益如何留在授書圖韓君美所藏支遁觀馬圖千金竒骨豈易得方外若人猶爾憐自是龍眠有深意不應叅作畫中禪王武子㸔馬圖深院移牀簇侍兒高盤雲髻緑絲絲情知櫪下駑駘骨不到渠家入看時題楊國寳藏畫馬圖黄馬昂頭似喙烏墨雲滿身千里駒而今沙苑春風裏落日晴蕪澹碧鋪鴈鷺圖晴溪沙暖鴛鴦睡小塢花濃蛺蝶飛誰畫賓鴻與饑鷺澹香踈荻雨霏霏題楊國寶鵲華風雨圖簿書堆山日停午坐久髭鬚滿塵土争如六月濟南間鵲華峰頭㸔風雨宋上皇詩意圖月落風煙變古今畫圖今見入清吟可憐意象經營日不到蒼生未了心馬嵬九齡既罷事已矣偃月堂深禍更深縱把霓裳都拂去未應邊馬不駸駸春草坡前萬馬塵麝香猶帶荔枝新思量前日盤中舞含笑君王是路人卜彥才所藏赤壁圖江山人物記當時再得坡仙境益竒今日披圖見高興簿書慚愧鬢如絲出西鄉人歌人笑上茶園花淡花濃隔稻田十日按行秋色裏畫圖才出武陵川越王臺春風青草越王臺脚底連雲海舶回萬國昇平有今日笑人陸賈奉書來葵堤散步堤上葵花爛錦光晚風吹袖獨彷徨不應畎𤱔棲遲處忘却傾心向太陽送别去國十年鴈影秋又逢離别可堪愁猿聲一道巴山黑黄葉孤城月滿樓贈史紫㣲參政王濬樓船一夕風順流聲勢下江東誰知更有如椽筆氣壓吳山第一峰郊行入山深處更山深一片晴波一片金莫道人家不成畫羊牛都在緑楊陰題竹林七賢圖滄海横流百戰身此心獨有醉鄉真逢君莫怪清狂客辛苦潘郎拜路塵書字崖溝上蒼崖丈五高昔人題此詫邊勞到今二百年來許一片空圍半野蒿梅嶺前人有詩上得梅山不見梅又云着俸買栽三十本清香留與雪中開因次其韻南海城邊奉使囘庾關曽記嶺頭梅自憐心似千山雪不見清香次第開題牧牛圖流水蒼烟緑樹坡青山牛背飽經過生平儘有安排處辛苦齊人扣角歌凌徳榮竹石圖翠影抽空弄晚凉雨苔含碧漬秋光漫山桃李春風底不似幽人意味長寄答雷按察中州元氣文章伯四海今知有使君一片濟時心未了風稜亦足張吾軍行役匆匆力未任欲因衰懶事幽尋詩來重謝多提奬跛鼈何堪有此心題盛教諭家藏山水圖剪破湘雲一片春澹横濃逺縂宜人幾時跳出黄塵去此畫中間着此身瞿塘圖瞿塘事去已千古蘆荻花飛兩岸秋四海昇平有今日卧吹簫管到杭州油井細溜津津湧石尖雲腴隱隱復暹暹銀釭滿貯燃燈坐似向東川㸔井鹽百井才出并州第一程凭髙百井見孤城瀟瀟風色今如此却憶梅花雪裏行懐古人道梁山是帝墟石樓苔雨上金鋪千年留得降王在辛苦昭陵六馬圖乾陵前有東西班共六十四人衣冠各異皆刻本國王名及所受唐職云題李吉甫所藏寥休詩軸誰道寥休與世疏青天推上六龍車㸔來詩筆今如此着白山人恐未如徽州學正胡泳子㳺自京都來過予於維揚以士常中郎長詩見示又省掾王約彦博謂子游文筆有中州氣象用是不敢以常書生遇之十月復會於杭且以樂府辱貺將拏舟歸江東因作二十八字以贈冠無獬豸帶無魚鶴步芹宫足自如一片青山滿船月不妨讀盡晦翁書挽宋海印居士二首詩酒交親半老臣田園成趣自由身囘頭行路風波裏得似先生有幾人楊栁陰陰拂緑苔杏花寂寂向誰開黄梁夢覺知何處白玊樓成不更來九日對菊憶姜霍二使君秋意生香簇緑雲土膏栽滿石頭盆誰憐白髮人千里獨對青山酒一尊高樹圍前射箭時小書樓上共題詩揚州燈火京城夜獨立秋風有所思渾源曽從仙子看南山玊井波深雪色寒今日重來三十載兒郎騎馬是清官三角城靈夏兵塵百戰鏖城根石壁矗雲高當時遺老今猶在説是山前有界濠挽姨兄尚書劉公五首外家宅相悲零落母氏風流記阿姨獨有吾兄今又去百年親話更誰知高梁河上十年别白塔亭前再見時萬里風沙顔色黑敝裘如結鬢如絲鐵石心腸報主知一生一死隔毫釐旌旗日影丹墀上三拜尚書亦自竒牧之萍梗寄呉東南北音容只夢中莫恨終天曽不見天高留付若堂封中郎堂上尚書宅才得從容又别離今日歸來亦衰病兩圍秋草不勝悲許左丞哀挽至元戊辰嘗從先生入京見先生敷奏如學知生知之説人心道心之論皆欵曲至到雖承詰問辭氣自如繼掌大政辭不受禄今雖云亡令人慚仰不肖頗辱教愛敢作詩以哭之順聖魏初抆淚書學道躬行意味真愛君辭氣見忠純千秋萬古先賢傳合作中朝第一人挽李仲常運使劍門秋色記分司煑茗西湖晚誦詩青眼如君幾人在不因鞭策獨傷時挽司農侯伯禄人誇鐵面自河東晚歳潛心理性中一日歸來便長往幾人終始得如公挽趙教授馬鬛封前乏妙辭牛腰卷裏又題詩傷心故老凋零盡誰説宫門唱第時挽夾谷士常公事關心毎盡勤文章細意見為人野齋不負為知已馬鬛封頭筆有神挽宋漢臣鑑山長安醉倒十年餘老木清霜一夢如前輩風流幾人在鑑山詩卷有圖書挽輔正臣讀徹閩人痛哭詩風流遺愛見新詞傷心御史青驄馬今日行行避有誰悼亡姬草堂一覺巫山夢行雨行雲今不知半夜青燈兩行淚催粧猶記去年時亷泉亷泉喬木出氛埃聞道平章手自栽一衖緑衣人不見依依如待相公來滕州王直卿父母八十之壽人生偕老古猶稀八十相看一與齊有子有孫家事了千年雙鶴上天梯成美堂偃蹇昂藏頗自竒與人成美不求知黄金鑄就官街屋不及傳家一軸詩子午渡早發五葉葵花盌口平虎蹄新過樹無聲三年按部成何事才見山王逺避行汝郎川汝郎川闊草油油秃尾河淤一漫流行上沙岡人不見黍田平碧澹生秋秋江晚景老樹蒼崖漬雨秋布帆風滿夕陽舟生平一半江湖夢不到元龍百尺樓池荷衰颯菊芬芳策杖吟詩上草堂滿目暮雲風捲盡郡樓寒角數聲長佚老堂為庸齋薛先生題人海抽身得自由只隨耆舊見風流而今冠葢長安道老死黄塵不肯休書王伯堅尚書海棠詩卷栢鄉花好入詩傳夢裡石家錦障鮮記與使君曾共醉江郊亭下水如天江郊栢鄉之園名也樹下有池如浸爛錦伯堅尚書以夢符海棠長詩見示有栢鄉三樹尤堪誇之句因書二十八字以識拜觀之歳月至元辛夘七月四日甘泉羊牛幾㸃土空黑盡日人烟不數家賴得甘泉城外道洛波如練帶川斜府谷行行春雨復秋烟西去長安又幾千落日空庭望南北黄河城下水連天解仲傑景陶軒梨花澹澹栁絲絲午夢醒來半醉時門外紅塵三百丈至人高卧㸔陶詩愚軒牀頭白酒屋頭山數册閒書竹兩竿張目不知人説似門前騎馬是高官蕭御史公琰章章綿蕝叔孫通矯矯麒麟御史驄四海昇平有今日更須危論沃宸聰順聖先壠拜祀後有述十首譜牒從姬舊有傳移家桑水憶當年只縁遺澤今仍在留得諸孫拜墓前菽水承顔盡所歡傳家風土占髙寒力田桑梓供租了孝弟讀書事最難袖裏春風事藹然不争功利不争賢蘇州一説天機在南北無兵四十年不愛君家億萬貲求師教子動京師春風丹桂三千尺秀出十郎更兩枝操藝逢時與命違恬然心思不求知兩魁文賦今仍在正是諸孫墮淚碑河北兵塵撥不開河南撑住數竒才郟城一死人争惜不到褒忠廟裏來羽書南北無消息山壓孤城破卵時一片丹心倚天地未應巡逺是男兒危節中間奉節行堂堂忠義見平生歸來杖屨林泉下誰遣天朝識姓名詩禮庭闈少日情亂來風雨一燈青慇懃著就三千字留與諸孫見典刑丘山零落愧何窮堂構空存慘澹中倚日青松一千樹石鯨鱗甲動秋風東峽青崖直上聳蒼烟東峽中邊盡水田賣劔買牛吾有意㑹須桑梓似當年馬謙甫頥貞齋不必區區名利塲恰將真偽試論量捫心有愧秋風屋便與山雷是兩鄉賦三秋霽賦并序丙辰春正月不雨夏四月不雨秋七月雨雨之明日霽僕也感萬物之得時傷所懐而未遇遂與客登燕昭之故城而眺焉草木林莾川原隴坂文文質質千種百品若有喜凉風順白露私分成遂有期而不尤怨於天地間者僕于是心攝神靜氣浩志定而向之所感一掃而無幾矣孟軻氏所謂舍之者非也助之長者亦非也槩於此有得焉因一賦云羲和烜赫以鞭馭兮扇乾坤於一鑠奈時令之靡常兮忽金精之炳爍起燭龍之久蟠兮吸滄海其如勺沛甘澤於四野兮俾死者而復作扶桑曉兮白日升清風發兮重光明無山阿與陵陸遞改色而增榮田千里兮咫尺黍離離而變青如行役之調飢獲壺飱與豆羮太行掃碧以西鶩碣石東峙其崢嶸漁散舟於岸曲席飜明而漾輕林陰䟽而逗日見行客之營營駭螮蝀之焜燿奄東天而横掣忽空中之白鳥亂晚風之晴雪高者隆低者偃顯者近㣲者逺無甘苦與強弱齊結實而錯落皥皥乎如三代之民兮不知孰為之然孰使之若也予於是悚然中以外變情因迹移鼓腹長嘯神和氣怡知昨非而今是諒窮通之有時舉酒飲客侑之以詩釣寂寞之濱兮魚鱗可食登巉巖之嶺兮雲輕可衣有書而讀無疾而嬉富與貴兮貧與卑得不得兮吾何知客曰蕭瑟兮草木摇落而變衰憭慄兮若將逺行登山臨水兮送將歸此非楚大夫宋玉之辭歟葢秋之為氣肅殺寒凉似乎叔世君昏政荒故商婦起琵琶之怨逐臣多去國之傷今子以可悲者樂可戚者洋洋何也余徐應客曰蒹葭蒼蒼白露為霜匪霜而蒼為妖為殃匪蒼而用為怪為狂知垂綸採芝者非示潔則知走高門要大駕者不足揚此天之理所以一吾之理所以常固亘千載而彌光者也客亦驚悟形神兩忘但烟汀之去鴈空夕草之寒螿
